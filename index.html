                ].map((r,ri)=>(
                  <div key={ri} style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,opacity:r.on?1:0.55,transition:'opacity .2s'}}>
                    <Toggle on={r.on} onChange={r.setOn} label={r.label}/>
                    <div style={{display:'flex',alignItems:'center',gap:6}}>
                      <NumInput value={r.val} onChange={r.setVal} decimals={2} placeholder="0" style={{...S.inp,width:150,textAlign:'right',background:r.on?'#fff':'#F4F6F8'}}/>
                      <span style={{color:'#6B7785',fontSize:13,fontWeight:600}}>₽</span>
                    </div>
                  </div>
                ))}
              </div>
              <div style={{background:'#0B3A63',borderRadius:10,padding:'14px 18px',color:'#fff'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Оборудование</span><span style={{fontWeight:600}}>{grand.toLocaleString('ru-RU')} ₽</span></div>
                {logN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Логистика</span><span>{logN.toLocaleString('ru-RU')} ₽</span></div>}
                {montN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Монтаж</span><span>{montN.toLocaleString('ru-RU')} ₽</span></div>}
                {shefN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Шеф-монтаж</span><span>{shefN.toLocaleString('ru-RU')} ₽</span></div>}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',borderTop:'1px solid rgba(255,255,255,0.25)',paddingTop:8,marginTop:6}}>
                  <span style={{fontSize:12,opacity:.85,textTransform:'uppercase',letterSpacing:'0.5px'}}>Итого</span>
                  <span style={{fontWeight:700,fontSize:22,letterSpacing:'-0.5px'}}>{final.toLocaleString('ru-RU')} ₽</span>
                </div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <label style={S.lbl}>Примечания</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Условия, сроки, гарантия..."
                style={{width:'100%',border:'1px solid #E6EBF0',borderRadius:6,padding:'8px 10px',fontSize:13,minHeight:55,boxSizing:'border-box',resize:'vertical',outline:'none',fontFamily:'Inter,Arial,sans-serif',color:'#1D1D1F'}}/>
            </div>
            <div style={{marginTop:14,paddingTop:14,borderTop:'1px solid #EEF2F6'}}>
              <div style={{fontSize:12,color:'#6B7785',marginBottom:8,fontWeight:600}}>Дополнительно в КП</div>
              <label style={{display:'flex',alignItems:'center',gap:10,cursor:_areaHa(projArea)>0?'pointer':'not-allowed',opacity:_areaHa(projArea)>0?1:0.5,marginBottom:8,fontSize:13.5,color:'#333'}}>
                <input type="checkbox" checked={perHaOn&&_areaHa(projArea)>0} disabled={_areaHa(projArea)<=0} onChange={e=>setPerHaOn(e.target.checked)} style={{width:16,height:16}}/>
                <span>Стоимость за 1 га {_areaHa(projArea)>0?<b style={{color:'#2C7FB8'}}>({(final/_areaHa(projArea)).toLocaleString('ru-RU',{maximumFractionDigits:0})} ₽/га)</b>:<span style={{color:'#999'}}>— укажите площадь проекта</span>}</span>
              </label>
              <label style={{display:'flex',alignItems:'center',gap:10,cursor:_hydraulics(irr)?'pointer':'not-allowed',opacity:_hydraulics(irr)?1:0.5,fontSize:13.5,color:'#333'}}>
                <input type="checkbox" checked={hydroOn&&!!_hydraulics(irr)} disabled={!_hydraulics(irr)} onChange={e=>setHydroOn(e.target.checked)} style={{width:16,height:16}}/>
                <span>Гидравлическая сводка {_hydraulics(irr)?<b style={{color:'#2C7FB8'}}>(насос, фильтрация)</b>:<span style={{color:'#999'}}>— нужны Irrigation Data</span>}</span>
              </label>
            </div>
          </div>

          <button onClick={()=>setView('preview')} style={{width:'100%',padding:15,background:'#0B3A63',color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:16,letterSpacing:'-0.2px'}}>
            Предпросмотр и PDF →
          </button>
          {/* Очистить — внизу, неакцентно */}
          <div style={{textAlign:'center',marginTop:20,paddingTop:14,borderTop:'1px solid #EEF2F6'}}>
            <button onClick={()=>setShowClear(true)} style={{padding:'6px 14px',background:'none',color:'#9aa',border:'none',cursor:'pointer',fontSize:12.5}}>🗑 Очистить все данные</button>
            {clearMsg&&<span style={{color:'#c0392b',fontWeight:600,fontSize:13,marginLeft:8}}>{clearMsg}</span>}
          </div>
          </div>{/* /kp-main */}
          </div>{/* /kp-cols */}
        </div>
      )}
      {/* МОДАЛКА ПРОСМОТРА ПРАЙСА */}
      {viewPrice&&(()=>{
        const allCats=Object.assign({},BUILTIN_CATALOGS,mergedExtra);
        const src=allCats[viewPrice];
        if(!src)return null;
        return(
          <div onClick={()=>setViewPrice(null)}
            style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div onClick={e=>e.stopPropagation()}
              style={{background:'#fff',borderRadius:12,maxWidth:800,width:'100%',maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
              <div style={{padding:'14px 18px',background:srcColor(viewPrice),color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16}}>{viewPrice==='dynamic'?src.name:'📋 '+src.name}</div>
                  <div style={{fontSize:12,opacity:.85}}>{src.items.length} позиций · кликните на позицию чтобы посмотреть</div>
                </div>
                <button onClick={()=>setViewPrice(null)} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:6,cursor:'pointer',fontSize:18,width:32,height:32,lineHeight:1}}>✕</button>
              </div>
              {viewPrice==='dynamic'&&(
                <div style={{padding:'8px 14px',background:'#FFF8E8',borderBottom:'1px solid #F3E0B8',fontSize:12,color:'#8a5a00',display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}}>
                  <span>Сюда автоматически попадают позиции, которых нет в других прайсах. В следующих КП их можно находить через поиск.</span>
                  <button onClick={()=>{ if(confirm('Очистить все «Мои позиции»? Это действие необратимо.')) clearDyn(); }}
                    style={{flexShrink:0,background:'#fff',border:'1px solid #E0B860',color:'#a06000',borderRadius:6,padding:'4px 10px',cursor:'pointer',fontWeight:600,fontSize:11}}>Очистить</button>
                </div>
              )}
              <div style={{padding:'8px 14px',borderBottom:'1px solid #eee'}}>
                <input id="price-modal-search" placeholder="Фильтр по названию или артикулу..."
                  onChange={e=>{
                    const q=e.target.value.toLowerCase();
                    const rows=document.querySelectorAll('[data-price-row]');
                    rows.forEach(r=>{
                      const txt=r.getAttribute('data-search');
                      r.style.display=(!q||txt.includes(q))?'flex':'none';
                    });
                  }}
                  style={{...S.inp,width:'100%',padding:'7px 12px',fontSize:14}}/>
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {src.items.map((it,i)=>(
                  <div key={i} data-price-row data-search={(it.n+' '+(it.a||'')+' '+(it.c||'')).toLowerCase()}
                    style={{padding:'8px 16px',borderBottom:'1px solid #f3f3f3',display:'flex',justifyContent:'space-between',gap:12,alignItems:'center',fontSize:13}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div>{it.n}</div>
                      <div style={{display:'flex',gap:8,marginTop:2}}>
                        {it.a&&<span style={{fontSize:11,color:'#999',fontFamily:'monospace'}}>арт: {it.a}</span>}
                        {it.c&&<span style={{fontSize:11,color:'#bbb',fontFamily:'monospace'}}>код: {it.c}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:'right',whiteSpace:'nowrap'}}>
                      <span style={{color:'#888',fontSize:12}}>опт: </span><b style={{color:'#0B3A63'}}>{it.p.toLocaleString('ru-RU')} ₽</b>
                      {it.r>it.p&&<div style={{fontSize:11,color:'#aaa'}}>розн: {it.r.toLocaleString('ru-RU')} ₽</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })()}

      {/* МОДАЛКА БАЗЫ КП */}
      {showDb&&(
        <div onClick={()=>setShowDb(false)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:'#fff',borderRadius:12,maxWidth:900,width:'100%',maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            <div style={{padding:'14px 18px',background:'#0B3A63',color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
              <div>
                <div style={{fontWeight:800,fontSize:16}}>📂 База КП</div>
                <div style={{fontSize:12,opacity:.85}}>{projects.length} сохранённых проектов</div>
              </div>
              <button onClick={()=>setShowDb(false)} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:6,cursor:'pointer',fontSize:18,width:32,height:32,lineHeight:1}}>✕</button>
            </div>
            <div style={{overflowY:'auto',padding:16,background:'#F8FAFC'}}>
              {projects.length===0?(
                <div style={{textAlign:'center',color:'#999',padding:'40px 20px',fontSize:14}}>
                  База пуста. Заполните КП и нажмите «💾 Сохранить в базу».
                </div>
              ):(
                <div style={{display:'grid',gap:12}}>
                  {projects.map(p=>{
                    const dt=new Date(p.savedAt);
                    const dStr=dt.toLocaleDateString('ru-RU',{day:'2-digit',month:'2-digit',year:'numeric'})+' '+dt.toLocaleTimeString('ru-RU',{hour:'2-digit',minute:'2-digit'});
                    const title=p.projNum||p.kpNum||('КП от '+dStr);
                    const money=(p.total||0).toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2});
                    return(
                      <div key={p.id} style={{background:'#fff',border:'1px solid #E6EBF0',borderRadius:10,padding:'14px 16px',position:'relative',overflow:'hidden'}}>
                        <div style={{position:'absolute',top:0,left:0,bottom:0,width:4,background:'#0B3A63'}}></div>
                        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:12,flexWrap:'wrap'}}>
                          <div style={{flex:1,minWidth:200}}>
                            <div style={{fontWeight:700,color:'#0B3A63',fontSize:15,marginBottom:4}}>{title}</div>
                            <div style={{display:'grid',gridTemplateColumns:'auto 1fr',gap:'2px 10px',fontSize:12.5,color:'#444'}}>
                              <span style={{color:'#888'}}>Заказчик:</span><span>{p.zakazchik||'—'}</span>
                              <span style={{color:'#888'}}>Объект:</span><span>{p.object||'—'}</span>
                              <span style={{color:'#888'}}>Сохранено:</span><span>{dStr}</span>
                              <span style={{color:'#888'}}>Позиции:</span><span>{p.itemCount||0} шт.</span>
                            </div>
                          </div>
                          <div style={{textAlign:'right'}}>
                            <div style={{fontSize:11,color:'#888',textTransform:'uppercase',letterSpacing:'0.5px'}}>Сумма</div>
                            <div style={{fontSize:18,fontWeight:700,color:'#0B3A63',whiteSpace:'nowrap'}}>{money} ₽</div>
                          </div>
                        </div>
                        <div style={{display:'flex',gap:8,marginTop:12}}>
                          <button onClick={()=>loadProject(p)}
                            style={{padding:'7px 16px',background:'#0B3A63',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>
                            Загрузить
                          </button>
                          <button onClick={()=>deleteProject(p.id)}
                            style={{padding:'7px 16px',background:'#fff',color:'#c0392b',border:'1px solid #f0c4be',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>
                            Удалить
                          </button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              )}
            </div>
          </div>
        </div>
      )}

      {/* МОДАЛКА ОЧИСТКИ */}
      {validate&&(()=>{
        const total=validate.noPrice.length+validate.noQty.length;
        const kindLabel=validate.kind==='pdf'?'PDF':'Excel';
        const proceed=()=>{ const k=validate.kind; setValidate(null); k==='pdf'?savePDF():saveXLSX(); };
        return (
          <div onClick={()=>setValidate(null)} style={{position:'fixed',inset:0,background:'rgba(11,25,45,0.55)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:16}}>
            <div onClick={e=>e.stopPropagation()} style={{background:'#fff',borderRadius:12,maxWidth:520,width:'100%',maxHeight:'80vh',overflow:'auto',boxShadow:'0 12px 48px rgba(0,0,0,0.3)'}}>
              <div style={{padding:'18px 22px',borderBottom:'1px solid #EEF2F6'}}>
                <div style={{fontSize:17,fontWeight:700,color:'#0B3A63'}}>Проверка перед выгрузкой {kindLabel}</div>
              </div>
              <div style={{padding:'16px 22px',fontSize:14,color:'#333'}}>
                {validate.empty&&<div style={{padding:'10px 14px',background:'#fde8e8',borderRadius:8,color:'#c0392b',marginBottom:12,fontWeight:600}}>В спецификации нет ни одной позиции с ценой и количеством.</div>}
                {validate.noPrice.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontWeight:700,color:'#b8860b',marginBottom:6}}>⚠ Без цены ({validate.noPrice.length}):</div>
                    <ul style={{margin:0,paddingLeft:20,color:'#555',fontSize:13,lineHeight:1.6}}>
                      {validate.noPrice.slice(0,8).map((x,i)=><li key={i}>{x.name}</li>)}
                      {validate.noPrice.length>8&&<li>…ещё {validate.noPrice.length-8}</li>}
                    </ul>
                  </div>
                )}
                {validate.noQty.length>0&&(
                  <div style={{marginBottom:14}}>
                    <div style={{fontWeight:700,color:'#7A4DAF',marginBottom:6}}>Без количества ({validate.noQty.length}):</div>
                    <ul style={{margin:0,paddingLeft:20,color:'#555',fontSize:13,lineHeight:1.6}}>
                      {validate.noQty.slice(0,6).map((x,i)=><li key={i}>{x.name}</li>)}
                      {validate.noQty.length>6&&<li>…ещё {validate.noQty.length-6}</li>}
                    </ul>
                  </div>
                )}
                <div style={{fontSize:13,color:'#6B7785'}}>Позиции без цены попадут в {kindLabel} с нулевой суммой, без количества — не попадут вовсе.</div>
              </div>
              <div style={{padding:'14px 22px',borderTop:'1px solid #EEF2F6',display:'flex',gap:10,justifyContent:'flex-end'}}>
                <button onClick={()=>setValidate(null)} style={{padding:'9px 18px',background:'#fff',color:'#0B3A63',border:'1px solid #E6EBF0',borderRadius:8,cursor:'pointer',fontWeight:600}}>Вернуться и исправить</button>
                <button onClick={proceed} style={{padding:'9px 18px',background:'#0B3A63',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700}}>Всё равно скачать {kindLabel}</button>
              </div>
            </div>
          </div>
        );
      })()}
      {toast&&(
        <div style={{position:'fixed',left:'50%',bottom:24,transform:'translateX(-50%)',zIndex:3000,background:toast.type==='error'?'#c0392b':'#0B3A63',color:'#fff',padding:'11px 20px',borderRadius:8,fontSize:14,fontWeight:600,boxShadow:'0 6px 24px rgba(0,0,0,0.3)',maxWidth:'90vw'}} onClick={()=>setToast(null)}>
          {toast.msg}
        </div>
      )}
      {showClear&&(
        <div onClick={()=>setShowClear(false)}
          style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2100,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
          <div onClick={e=>e.stopPropagation()}
            style={{background:'#fff',borderRadius:12,maxWidth:420,width:'100%',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
            <div style={{padding:'18px 20px 8px'}}>
              <div style={{fontWeight:700,fontSize:17,color:'#c0392b',marginBottom:8}}>🗑 Очистить все данные?</div>
              <div style={{fontSize:13.5,color:'#444',lineHeight:1.5}}>Будут удалены все позиции, реквизиты, параметры проекта, логистика и примечания текущего КП. Сохранённые в базе проекты и прайсы не затрагиваются. Действие необратимо.</div>
            </div>
            <div style={{display:'flex',gap:10,justifyContent:'flex-end',padding:'14px 20px 18px'}}>
              <button onClick={()=>setShowClear(false)}
                style={{padding:'9px 18px',background:'#fff',color:'#0B3A63',border:'1px solid #E6EBF0',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>Отмена</button>
              <button onClick={clearAll}
                style={{padding:'9px 18px',background:'#c0392b',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>Очистить всё</button>
            </div>
          </div>
        </div>
      )}

      <style>{`input:focus,textarea:focus,select:focus{border-color:#2C7FB8!important;box-shadow:0 0 0 2px rgba(44,127,184,0.15)} @media print{.no-print{display:none!important}}`}</style>
    </div>
  );
}

class ErrorBoundary extends React.Component{
  constructor(p){ super(p); this.state={err:null}; }
  static getDerivedStateFromError(err){ return {err}; }
  componentDidCatch(err,info){ try{ console.error('ErrorBoundary:',err,info); }catch(e){} }
  render(){
    if(!this.state.err) return this.props.children;
    const msg=(this.state.err&&this.state.err.message)||String(this.state.err);
    return (
      <div style={{maxWidth:560,margin:'60px auto',padding:'28px 30px',background:'#fff',borderRadius:12,boxShadow:'0 4px 24px rgba(0,0,0,0.12)',fontFamily:'Inter,Arial,sans-serif',color:'#1D1D1F'}}>
        <div style={{fontSize:20,fontWeight:700,color:'#0B3A63',marginBottom:8}}>Что-то пошло не так</div>
        <div style={{fontSize:14,color:'#555',marginBottom:6}}>Приложение столкнулось с ошибкой и не может продолжить. Ваш черновик сохранён автоматически.</div>
        <div style={{fontSize:12,color:'#999',background:'#F6F8FA',borderRadius:6,padding:'8px 10px',marginBottom:18,fontFamily:'monospace',whiteSpace:'pre-wrap',wordBreak:'break-word'}}>{msg}</div>
        <div style={{display:'flex',gap:10,flexWrap:'wrap'}}>
          <button onClick={()=>{ try{ location.reload(); }catch(e){} }} style={{padding:'10px 20px',background:'#0B3A63',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:14}}>Перезагрузить</button>
          <button onClick={()=>{ try{ localStorage.removeItem('np_draft'); }catch(e){} try{ location.reload(); }catch(e){} }} style={{padding:'10px 20px',background:'#fff',color:'#c0392b',border:'1px solid #f0c0c0',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>Сбросить черновик и перезагрузить</button>
        </div>
      </div>
    );
  }
}

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<ErrorBoundary><KPApp/></ErrorBoundary>);
  </script>
</body>
</html>
