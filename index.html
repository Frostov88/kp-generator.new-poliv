function scoreMatch(item, q) {
  const name = item.n.toLowerCase();
  const art = (item.a||'').toLowerCase();
  const code = (item.c||'').toLowerCase();
  if (art === q || code === q) return 100;
  if (art.startsWith(q)) return 90;
  if (name.startsWith(q)) return 85;
  const words = q.split(/\s+/).filter(Boolean);
  if (words.length === 0) return 0;
  const all = words.every(w => name.includes(w) || art.includes(w) || code.includes(w));
  if (all) return 65 + words.length * 5;
  const cnt = words.filter(w => name.includes(w) || art.includes(w)).length;
  return cnt > 0 ? cnt * 12 : 0;
}

function searchAll(catalogs, query, extraCatalogs) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  const results = [];
  const allCats = {...catalogs};
  Object.assign(allCats, extraCatalogs);
  for (const [srcId, src] of Object.entries(allCats)) {
    for (const item of src.items) {
      const score = scoreMatch(item, q);
      if (score > 0) results.push({...item, srcId, srcName: src.name, score});
    }
  }
  return results.sort((a,b) => b.score - a.score).slice(0, 16);
}

// ===================== RTF PARSER =====================
function parseRTF(text) {
  const chunks=[];
  const re=/\\shptxt(.*?)(?=\{\\sp|\}\})/gs;
  let m;
  while((m=re.exec(text))!==null){
    const c=m[1].replace(/\\[a-z]+(-?\d+)?[ ]?/g,'').replace(/[{}]/g,'').replace(/\r?\n/g,' ').trim();
    if(c&&c.length>1&&!c.startsWith('0100'))chunks.push(c);
  }
  const isNum=s=>/^[\d\s.,\xa0]+$/.test(s.trim());
  const pq=s=>parseFloat(s.replace(/[\s\xa0]/g,'').replace(',','.'));
  const SKIP=new Set(['Length/Number','Description','Warehouse Code','Total','Page','Irricad Version','20.0','Zone Summary/Mainline','Bill of Materials','Unconnected','Total Capital Cost','Prices reported are','RETAIL','discounted by','Notes :','Report Date :','Design Date :','Site :','Client :','Designer :','Company :']);
  const zone=[],main=[];
  let mode=null,i=0;
  while(i<chunks.length){
    const c=chunks[i];
    if(c==='Zone Items'){mode='zone';i++;continue;}
    if(c==='Mainline'){mode='main';i++;continue;}
    if(c==='Unconnected'||c==='Total Capital Cost'){mode=null;i++;continue;}
    if(SKIP.has(c)||c.startsWith('$')){i++;continue;}
    if(mode&&isNum(c)&&i+1<chunks.length){
      const qty=pq(c),name=chunks[i+1]||'';
      if(qty>0&&name&&!isNum(name)&&!SKIP.has(name)){
        (mode==='zone'?zone:main).push({name,qty:Math.round(qty*10)/10});
        i+=2;if(i<chunks.length&&!isNum(chunks[i])&&!SKIP.has(chunks[i])&&chunks[i]!=='Mainline'&&chunks[i]!=='Unconnected')i++;continue;
      }
    }
    if(mode==='main'&&!isNum(c)&&!SKIP.has(c)&&i+1<chunks.length&&isNum(chunks[i+1])){
      const qty=pq(chunks[i+1]);
      if(qty>0){main.push({name:c,qty:Math.round(qty*10)/10});i+=2;if(i<chunks.length&&!isNum(chunks[i])&&!SKIP.has(chunks[i]))i++;continue;}
    }
    i++;
  }
  return{zone,main};
}

function parseXLSXFile(rows, filename) {
  const fn = filename.toLowerCase();

        items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:String(c||''),a:String(a||'')});

        const p=typeof our==='number'&&our>0?our:(typeof retail==='number'&&retail>0?retail:0);

        if(p>0)items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(r*100)/100,c:String(c||''),a:String(a||'')});
      }
    }
  } else if (fn.includes('грин')||fn.includes('green')||hdr.includes('greenhelper')) {
    for (const row of rows.slice(8)) {
      const a=row[1],name=row[2],p=row[6];
      if(name&&typeof name==='string'&&name.trim().length>3&&typeof p==='number'&&p>0)
        items.push({n:name.replace(/\n/g,' ').trim().slice(0,110),u:'шт',p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:'',a:String(a||'')});
    }
  } else {
    // Generic parser
    let nc=-1,pc=-1,rc=-1,ac=-1,cc=-1;
    for(let r=0;r<Math.min(8,rows.length);r++){
      const row=rows[r]||[];
      row.forEach((v,c)=>{
        const s=String(v||'').toLowerCase();
        if((s.includes('наименован')||s.includes('номенклатур'))&&nc<0)nc=c;
        if(s.includes('артикул')&&ac<0)ac=c;
        if((s.includes('розниц')||s.includes('ррц')||s.includes('рец'))&&rc<0)rc=c;
        if((s.includes('ваша')||s.includes('опт')||s.includes('мрц'))&&pc<0)pc=c;
        if(s.includes('цена')&&pc<0)pc=c;
        if((s.includes('код')&&!s.includes('штрих'))&&cc<0)cc=c;
      });
      if(nc>=0&&pc>=0)break;
    }
    if(nc>=0&&pc>=0){
      for(const row of rows){
        const n=row[nc],p=row[pc],r=rc>=0?row[rc]:0;
        if(n&&typeof n==='string'&&n.trim().length>3&&typeof p==='number'&&p>0)
          items.push({n:n.trim(),u:'шт',p:Math.round(p*100)/100,r:Math.round((r||p)*100)/100,c:cc>=0?String(row[cc]||''):'',a:ac>=0?String(row[ac]||''):''});
      }
    }
  }
  return items;
}

// ===================== EXCEL-STYLE NUMBER INPUT =====================
// При фокусе — чистое число для редактирования
// При blur — форматирует как "3 500,00"
function NumInput({ value, onChange, style, placeholder='0', decimals=2 }) {
  const [focused, setFocused] = useState(false);
  const [raw, setRaw] = useState('');
  const inputRef = useRef();

  const fmt = (v) => {
    const n = parseFloat(v);
    if (!v && v !== 0) return '';
    if (isNaN(n) || n === 0) return '';
    return n.toLocaleString('ru-RU', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };

  const parse = (s) => {
    // Accept both comma and dot as decimal separator, strip spaces
    const cleaned = s.replace(/\s/g, '').replace(',', '.');
    const n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  };

  const handleFocus = () => {
    setFocused(true);
    // Show raw number for editing (no spaces, use dot)
    const n = parseFloat(value) || 0;
    setRaw(n > 0 ? String(n).replace('.', ',') : '');
    setTimeout(() => inputRef.current?.select(), 0);
  };

  const handleBlur = () => {
    setFocused(false);
    const n = parse(raw);
    onChange(n);
  };

  const handleChange = (e) => {
    // Only allow digits, comma, dot, minus
    const v = e.target.value.replace(/[^\d,.\-]/g, '');
    setRaw(v);
  };

  const handleKeyDown = (e) => {
    if (e.key === 'Enter' || e.key === 'Tab') {
      inputRef.current?.blur();
    }
  };

  const displayVal = focused ? raw : fmt(value);

  return (
    <input
      ref={inputRef}
      value={displayVal}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      placeholder={focused ? '' : placeholder}
      style={{
        ...style,
        textAlign: 'right',
        fontVariantNumeric: 'tabular-nums',
        letterSpacing: focused ? 'normal' : '0.02em',
      }}
    />
  );
}

                          <div style={{display:'flex',alignItems:'center',gap:1}}>

                              style={{...S.inp,width:44,padding:'2px 3px',background:'#fffdf0',border:'1px solid #f39c12',color:'#d07000',fontWeight:700,fontSize:12,textAlign:'center'}}/>
                            <span style={{fontSize:10,color:'#d07000'}}>%</span>
                          </div>
                        </td>
                        <td style={{padding:'2px 3px'}}>
                          <NumInput value={item.price||0} onChange={v=>updItem(sec.id,item.id,'price',v)} decimals={2}
                            style={{...S.inp,width:88,padding:'2px 4px',fontSize:12,fontWeight:600,color:'#2d6622',border:warn?'1px solid #f39c12':'1px solid #3a7d2c',background:warn?'#fffdf0':'#f0fff8'}}/>
                        </td>
                        <td style={{padding:'2px 7px',textAlign:'right',fontWeight:600,color:sum>0?'#2d6622':'#ddd',whiteSpace:'nowrap',fontSize:12}}>{sum>0?sum.toLocaleString('ru-RU'):'—'}</td>
                        <td style={{padding:'2px 3px',textAlign:'center'}}>
                          <button onClick={()=>delItem(sec.id,item.id)}
                            style={{background:'none',border:'none',cursor:'pointer',fontSize:15,color:'#ddd',padding:'2px 3px',borderRadius:3,lineHeight:1}}
                            onMouseEnter={e=>{e.currentTarget.style.color='#e74c3c';e.currentTarget.style.background='#fde8e8';}}
                            onMouseLeave={e=>{e.currentTarget.style.color='#ddd';e.currentTarget.style.background='none';}}>🗑</button>
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            {/* Hot items */}
            {hot.length>0&&(
              <div style={{padding:'7px 12px',borderTop:'1px solid #eef5ea',background:'#fafdf8'}}>
                <div style={{fontSize:11,color:'#888',fontWeight:600,marginBottom:5}}>⭐ Ходовые (по частоте использования):</div>
                <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                  {hot.map((h,i)=>{
                    const key=(h.a||h.n||'').slice(0,40);
                    return(
                      <div key={i} style={{display:'flex',alignItems:'center',gap:1}}>
                        <button onClick={()=>addFromSearch(sec.id,h)}
                          style={{padding:'3px 8px',background:'#fff',border:'1px solid #acd49a',color:'#2d6622',borderRadius:12,cursor:'pointer',fontSize:11,maxWidth:200,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap',display:'flex',alignItems:'center',gap:4}}>
                          <span>+</span>
                          <span style={{overflow:'hidden',textOverflow:'ellipsis'}}>{h.n.slice(0,25)}</span>
                          {h.a&&<span style={{fontSize:9,opacity:.6}}>[{h.a.slice(0,8)}]</span>}
                          <span style={{fontSize:9,background:'#e8f3e4',borderRadius:8,padding:'0 4px',color:'#666'}}>×{h.uc||1}</span>
                        </button>
                        <button onClick={()=>removeHot(key)} style={{background:'none',border:'none',cursor:'pointer',color:'#ddd',fontSize:11,padding:'0 2px',lineHeight:1}}
                          onMouseEnter={e=>e.currentTarget.style.color='#e74c3c'}
                          onMouseLeave={e=>e.currentTarget.style.color='#ddd'}>✕</button>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Search */}
            <div style={{borderTop:'1px solid #eef5ea',padding:'8px 12px',position:'relative',background:'#f9fdf8'}}>
              <div style={{display:'flex',gap:8,alignItems:'center'}}>
                <span style={{fontSize:12,color:'#2d6622',fontWeight:700,whiteSpace:'nowrap'}}>🔍 Поиск в {totalBuiltin+totalExtra} позициях:</span>
                <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Введите название, артикул или код..."
                  style={{...S.inp,flex:1,padding:'6px 10px',fontSize:13,border:'1px solid #3a7d2c'}} autoComplete="off"/>
                {q&&<button onClick={()=>{setQ('');setRes([]);}} style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:18,lineHeight:1}}>✕</button>}
              </div>

              {res.length>0&&(
                <div style={{position:'absolute',left:12,right:12,top:'100%',zIndex:500,background:'#fff',border:'1px solid #3a7d2c',borderRadius:8,boxShadow:'0 8px 24px rgba(0,0,0,0.15)',maxHeight:300,overflowY:'auto'}}>
                  {res.map((r,i)=>(
                    <div key={i} onClick={()=>{addFromSearch(sec.id,r);setQ('');setRes([]);}}
                      style={{padding:'8px 12px',cursor:'pointer',borderBottom:'1px solid #f0f0f0',display:'flex',justifyContent:'space-between',alignItems:'flex-start',gap:8}}
                      onMouseEnter={e=>e.currentTarget.style.background='#f0f7eb'}
                      onMouseLeave={e=>e.currentTarget.style.background='#fff'}>
                      <div style={{flex:1,minWidth:0}}>
                        <div style={{fontSize:13,fontWeight:500,whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{r.n}</div>
                        <div style={{display:'flex',gap:6,marginTop:2,flexWrap:'wrap'}}>
                          {r.a&&<span style={{fontSize:11,color:'#888',fontFamily:'monospace'}}>арт: {r.a}</span>}
                          {r.c&&<span style={{fontSize:11,color:'#bbb',fontFamily:'monospace'}}>код: {r.c}</span>}
                          <span style={{fontSize:11,fontWeight:600,color:'#fff',background:srcColor(r.srcId),borderRadius:8,padding:'0 6px'}}>{r.srcName}</span>
                        </div>
                      </div>
                      <div style={{textAlign:'right',whiteSpace:'nowrap',flexShrink:0}}>
                        <div style={{fontSize:11,color:'#777'}}>закуп: <b>{r.p.toLocaleString('ru-RU')} ₽</b></div>
                        <div style={{fontSize:12,color:'#2d6622',fontWeight:700}}>→ {Math.round(r.p*(1+globalMarkup/100)).toLocaleString('ru-RU')} ₽</div>
                      </div>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Footer */}
            <div style={{padding:'7px 12px',display:'flex',justifyContent:'space-between',borderTop:'1px solid #eef5ea'}}>
              <button onClick={()=>addBlank(sec.id)} style={{padding:'5px 12px',background:'#e8f3e4',border:'1px solid #acd49a',color:'#2d6622',borderRadius:5,cursor:'pointer',fontSize:12,fontWeight:600}}>+ Пустая строка</button>
              <div style={{fontWeight:700,color:'#2d6622',fontSize:13}}>Итого: {st>0?st.toLocaleString('ru-RU')+' ₽':'—'}</div>
            </div>
          </div>
        )}
      </div>
    );
  };

  // ============================================================
  // RENDER
  // ============================================================
  return(
    <div style={{minHeight:'100vh',background:'#ecf5e8',fontFamily:'Arial,sans-serif'}}>
      {/* Topbar */}
      <div style={{background:'#2d6622',color:'#fff',padding:'10px 20px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:200,boxShadow:'0 2px 8px rgba(0,0,0,0.2)'}}>
        <div>
          <div style={{fontWeight:800,fontSize:16}}>💧 Новый Полив — Генератор КП</div>
          <div style={{fontSize:11,opacity:.7}}>База: {totalBuiltin.toLocaleString()} встроенных{totalExtra>0?` + ${totalExtra} доп.`:''} позиций</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:13,opacity:.85}}>Итого: <b>{final.toLocaleString('ru-RU')} ₽</b></span>
          <button onClick={()=>setView('edit')} style={{padding:'6px 14px',borderRadius:5,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='edit'?'#fff':'rgba(255,255,255,0.2)',color:view==='edit'?'#2d6622':'#fff'}}>✏️ Редактор</button>
          <button onClick={()=>setView('preview')} style={{padding:'6px 14px',borderRadius:5,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='preview'?'#fff':'rgba(255,255,255,0.2)',color:view==='preview'?'#2d6622':'#fff'}}>👁 PDF</button>
        </div>
      </div>

      {view==='preview'?(
        <div style={{maxWidth:900,margin:'0 auto',padding:24}}>
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            <button onClick={()=>setView('edit')} style={{padding:'8px 18px',border:'1px solid #2d6622',background:'#fff',color:'#2d6622',borderRadius:5,cursor:'pointer',fontWeight:600}}>← Назад</button>
            <button onClick={()=>window.print()} style={{padding:'8px 22px',background:'#2d6622',color:'#fff',border:'none',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:14}}>🖨 Сохранить в PDF</button>
            <span style={{fontSize:12,color:'#777',lineHeight:'34px'}}>Принтер → «Сохранить как PDF»</span>
          </div>
          <div style={{background:'#fff',borderRadius:10,padding:'36px 44px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}><PrintView/></div>
        </div>
      ):(
        <div style={{maxWidth:1200,margin:'0 auto',padding:'20px 16px'}}>

          {/* Встроенные прайсы */}
          <div style={{background:'#fff',borderRadius:10,padding:18,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,color:'#2d6622',marginBottom:12,fontSize:14}}>📚 Встроенные прайсы (обновляются при передаче новых файлов)</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              {Object.entries(BUILTIN_CATALOGS).map(([id,src])=>(
                <div key={id} style={{padding:'5px 12px',borderRadius:20,fontWeight:600,fontSize:12,color:'#fff',background:srcColor(id)}}>
                  {src.name} — {src.items.length} поз.
                </div>
              ))}
            </div>
            <div style={{display:'flex',gap:12,alignItems:'center',flexWrap:'wrap'}}>
              <div>
                <input ref={xlsxRef} type="file" accept=".xlsx,.xls" multiple style={{display:'none'}} onChange={handleXLSX}/>
                <button onClick={()=>xlsxRef.current.click()} style={{padding:'7px 16px',background:'#e8f3e4',border:'1px solid #acd49a',color:'#2d6622',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>
                  + Добавить доп. прайс
                </button>
              </div>
              {Object.entries(extraCatalogs).map(([id,src])=>(
                <div key={id} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:'#f0f7eb',borderRadius:16,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#2d6622'}}>{src.name} ({src.items.length})</span>
                  <button onClick={()=>setExtraCatalogs(p=>{const n={...p};delete n[id];return n;})} style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:14,lineHeight:1}}
                    onMouseEnter={e=>e.currentTarget.style.color='#e74c3c'}
                    onMouseLeave={e=>e.currentTarget.style.color='#aaa'}>✕</button>
                </div>
              ))}
            </div>
          </div>

          {/* Накрутка */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
            <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{fontWeight:700,color:'#d07000',fontSize:14}}>📈 Глобальная накрутка:</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <NumInput value={globalMarkup} onChange={v=>setGlobalMarkup(v)} decimals={0}
                  style={{...S.inp,width:70,fontSize:18,fontWeight:800,color:'#d07000',border:'2px solid #f39c12',padding:'4px 6px',textAlign:'center'}}/>
                <span style={{fontWeight:700,color:'#d07000',fontSize:18}}>%</span>
                <button onClick={applyMarkup} style={{padding:'6px 14px',background:'#f39c12',color:'#fff',border:'none',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:13}}>Применить ко всем</button>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setPriceType('opt')} style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontWeight:600,fontSize:12,background:priceType==='opt'?'#2d6622':'#e8f3e4',color:priceType==='opt'?'#fff':'#2d6622'}}>База: Опт</button>
                <button onClick={()=>setPriceType('retail')} style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontWeight:600,fontSize:12,background:priceType==='retail'?'#2d6622':'#e8f3e4',color:priceType==='retail'?'#fff':'#2d6622'}}>База: Розница</button>
              </div>
              <div style={{fontSize:12,color:'#666',background:'#f0f7eb',padding:'6px 12px',borderRadius:6}}>
                Пример: 1000₽ → <b style={{color:'#2d6622'}}>{Math.round(1000*(1+globalMarkup/100)).toLocaleString()} ₽</b>
              </div>
            </div>
          </div>

          {/* RTF */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:rtfStatus==='ok'?'2px solid #3a7d2c':'2px dashed #a8d498'}}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:'#2d6622'}}>📐 RTF из Irricad (Bill of Materials) — опционально</div>
                <div style={{fontSize:13,color:'#666',marginTop:2}}>Трубы и капельная линия подтянутся автоматически, цены из прайса подставятся сами</div>
              </div>
              <div>
                <input ref={rtfRef} type="file" accept=".rtf" style={{display:'none'}} onChange={handleRTF}/>
                <button onClick={()=>rtfRef.current.click()} style={{padding:'8px 18px',background:rtfStatus==='ok'?'#5a9a47':'#3a7d2c',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontWeight:700}}>
                  {rtfStatus==='ok'?'✅ Загружен':'📂 Выбрать RTF'}
                </button>
              </div>
            </div>
            {rtfStatus==='error'&&<div style={{marginTop:8,padding:'6px 12px',background:'#fde8e8',borderRadius:5,fontSize:13,color:'#c0392b'}}>⚠️ Не удалось распознать файл</div>}
          </div>

          {/* Реквизиты */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,color:'#2d6622',marginBottom:12,fontSize:14}}>📄 Реквизиты КП</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
              <div><label style={S.lbl}>Номер КП</label><input style={{...S.inp,width:'100%'}} value={kpNum} onChange={e=>setKpNum(e.target.value)} placeholder="КП-001"/></div>
              <div><label style={S.lbl}>Дата</label><input style={{...S.inp,width:'100%'}} type="date" value={kpDate} onChange={e=>setKpDate(e.target.value)}/></div>
              <div><label style={S.lbl}>Тип цен</label><select style={{...S.inp,width:'100%'}} value={typeCeny} onChange={e=>setTypeCeny(e.target.value)}><option>Опт</option><option>Розница</option><option>Дилер</option></select></div>
              <div><label style={S.lbl}>Объект</label><input style={{...S.inp,width:'100%'}} value={object} onChange={e=>setObject(e.target.value)} placeholder="Виноград, сад..."/></div>
              <div style={{gridColumn:'span 2'}}><label style={S.lbl}>Заказчик</label><input style={{...S.inp,width:'100%'}} value={zakazchik} onChange={e=>setZakazchik(e.target.value)} placeholder='ООО "Альминские холмы"'/></div>
              <div><label style={S.lbl}>Исполнитель</label><input style={{...S.inp,width:'100%'}} value={ispolnitel} onChange={e=>setIspolnitel(e.target.value)}/></div>
              <div><label style={S.lbl}>Телефон</label><input style={{...S.inp,width:'100%'}} value={phone} onChange={e=>setPhone(e.target.value)}/></div>
            </div>
          </div>

          {/* Sections */}
          {sections.map(sec=><SectionBlock key={sec.id} sec={sec}/>)}

          {/* Logistics */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)'}}>
            <div style={{fontWeight:700,color:'#2d6622',marginBottom:12,fontSize:14}}>🚚 Логистика и монтаж</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:14,alignItems:'end'}}>
              <div><label style={S.lbl}>Логистика, ₽</label>
                <NumInput value={parseFloat(logistika)||0} onChange={v=>setLogistika(String(v))} decimals={2} placeholder="0"
                  style={{...S.inp,width:'100%'}}/>
              </div>
              <div><label style={S.lbl}>Шеф-монтаж или монтаж, ₽</label>
                <div style={{display:'flex',gap:6}}>
                  <NumInput value={parseFloat(shefMontazh)||0} onChange={v=>setShefMontazh(String(v))} decimals={2} placeholder="0"
                    style={{...S.inp,flex:1}}/>
                  <select value={shefUnit} onChange={e=>setShefUnit(e.target.value)} style={{...S.inp,width:60}}><option>га</option><option>шт.</option><option>к-т.</option></select>
                </div>
              </div>
              <div style={{background:'#e8f3e4',borderRadius:8,padding:'10px 14px'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>Оборудование:</span><span style={{fontWeight:600}}>{grand.toLocaleString('ru-RU')} ₽</span></div>
                {logN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>Логистика:</span><span>{logN.toLocaleString('ru-RU')} ₽</span></div>}
                {shefN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:3}}><span>Монтаж:</span><span>{shefN.toLocaleString('ru-RU')} ₽</span></div>}
                <div style={{display:'flex',justifyContent:'space-between',fontWeight:800,fontSize:15,color:'#2d6622',borderTop:'1px solid #acd49a',paddingTop:6,marginTop:4}}><span>ИТОГО:</span><span>{final.toLocaleString('ru-RU')} ₽</span></div>
              </div>
            </div>
            <div style={{marginTop:12}}><label style={S.lbl}>Примечания</label><textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Условия, сроки, гарантия..." style={{width:'100%',border:'1px solid #c8ddb0',borderRadius:5,padding:'7px 10px',fontSize:13,minHeight:55,boxSizing:'border-box',resize:'vertical',outline:'none'}}/></div>
          </div>

          <button onClick={()=>setView('preview')} style={{width:'100%',padding:14,background:'#2d6622',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:800,fontSize:16}}>
            👁 Предпросмотр и PDF →
          </button>
        </div>
      )}
      <style>{`input:focus,textarea:focus,select:focus{border-color:#3a7d2c!important;box-shadow:0 0 0 2px rgba(58,125,44,0.13)}`}</style>
    </div>
  );
}

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KPApp />);
  </script>
</body>
</html>
