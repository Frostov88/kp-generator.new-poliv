// ===================== SEARCH =====================
function scoreMatch(item, q) {
  const name = item.n.toLowerCase();
  const art = (item.a||'').toLowerCase();
  const code = (item.c||'').toLowerCase();
  if (art === q || code === q) return 100;
  if (art.startsWith(q)) return 90;
  if (name.startsWith(q)) return 85;
  const words = q.split(/\s+/).filter(Boolean);
  if (words.length === 0) return 0;
  const all = words.every(w => name.includes(w) || art.includes(w) || code.includes(w));
  if (all) return 65 + words.length * 5;
  const cnt = words.filter(w => name.includes(w) || art.includes(w)).length;
  return cnt > 0 ? cnt * 12 : 0;
}

function searchAll(catalogs, query, extraCatalogs, srcFilter) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  const results = [];
  const allCats = Object.assign({}, catalogs, extraCatalogs);
  for (const [srcId, src] of Object.entries(allCats)) {
    if (srcFilter && srcFilter !== 'all' && srcId !== srcFilter) continue;
    for (const item of src.items) {
      const score = scoreMatch(item, q);
      if (score > 0) results.push({...item, srcId, srcName: src.name, score});
    }
  }
  return results.sort((a,b) => b.score - a.score).slice(0, 50);
}

// Получить все позиции конкретного прайса (для просмотра)
function getAllFromSource(catalogs, extraCatalogs, srcId) {
  const allCats = Object.assign({}, catalogs, extraCatalogs);
  const src = allCats[srcId];
  if (!src) return [];
  return src.items.map(item => ({...item, srcId, srcName: src.name}));
}

function parseRTF(text) {
  const chunks=[];
  const re=/\\shptxt(.*?)(?=\{\\sp|\}\})/gs;
  let m;
  while((m=re.exec(text))!==null){
    const c=m[1].replace(/\\[a-z]+(-?\d+)?[ ]?/g,'').replace(/[{}]/g,'').replace(/\r?\n/g,' ').trim();
    if(c&&c.length>1&&!c.startsWith('0100'))chunks.push(c);
  }
  const isNum=s=>/^[\d\s.,\xa0]+$/.test(s.trim());
  const pq=s=>parseFloat(s.replace(/[\s\xa0]/g,'').replace(',','.'));
  const SKIP=new Set(['Length/Number','Description','Warehouse Code','Total','Page','Irricad Version','20.0','Zone Summary/Mainline','Bill of Materials','Unconnected','Total Capital Cost','Prices reported are','RETAIL','discounted by','Notes :','Report Date :','Design Date :','Site :','Client :','Designer :','Company :']);
  const zone=[],main=[];
  let mode=null,i=0;
  while(i<chunks.length){
    const c=chunks[i];
    if(c==='Zone Items'){mode='zone';i++;continue;}
    if(c==='Mainline'){mode='main';i++;continue;}
    if(c==='Unconnected'||c==='Total Capital Cost'){mode=null;i++;continue;}
    if(SKIP.has(c)||c.startsWith('$')){i++;continue;}
    if(mode&&isNum(c)&&i+1<chunks.length){
      const qty=pq(c),name=chunks[i+1]||'';
      if(qty>0&&name&&!isNum(name)&&!SKIP.has(name)){
        (mode==='zone'?zone:main).push({name,qty:Math.round(qty*10)/10});
        i+=2;if(i<chunks.length&&!isNum(chunks[i])&&!SKIP.has(chunks[i])&&chunks[i]!=='Mainline'&&chunks[i]!=='Unconnected')i++;continue;
      }
    }
    if(mode==='main'&&!isNum(c)&&!SKIP.has(c)&&i+1<chunks.length&&isNum(chunks[i+1])){
      const qty=pq(chunks[i+1]);
      if(qty>0){main.push({name:c,qty:Math.round(qty*10)/10});i+=2;if(i<chunks.length&&!isNum(chunks[i])&&!SKIP.has(chunks[i]))i++;continue;}
    }
    i++;
  }
  return{zone,main};
}

// ===================== XLSX PARSER =====================
function parseXLSXFile(rows, filename) {
  const fn = filename.toLowerCase();
  const hdr = rows.slice(0,6).map(r=>(r||[]).map(c=>String(c||'').toLowerCase()).join(' ')).join(' ');
  const items = [];
  if (fn.includes('вал')||fn.includes('val')||hdr.includes('valfex')) {
    for (const row of rows.slice(4)) {
      const n=row[10],u=row[11],p=row[16],c=row[3],a=row[6];
      if(n&&typeof n==='string'&&n.trim().length>3&&typeof p==='number'&&p>0)
        items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:String(c||''),a:String(a||'')});
    }
  } else if (fn.includes('клеев')||hdr.includes('альфакод')||hdr.includes('ррц')) {
    for (const row of rows.slice(3)) {
      const n=row[3],u=row[4],retail=row[6],our=row[8],c=row[1],a=row[2];
      if(n&&typeof n==='string'&&n.trim().length>3){
        const p=typeof our==='number'&&our>0?our:(typeof retail==='number'&&retail>0?retail:0);
        const r=typeof retail==='number'&&retail>0?retail:p;
        if(p>0)items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(r*100)/100,c:String(c||''),a:String(a||'')});
      }
    }
  } else if (fn.includes('грин')||fn.includes('green')) {
    for (const row of rows.slice(8)) {
      const a=row[1],name=row[2],p=row[6];
      if(name&&typeof name==='string'&&name.trim().length>3&&typeof p==='number'&&p>0)
        items.push({n:name.replace(/\n/g,' ').trim().slice(0,110),u:'шт',p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:'',a:String(a||'')});
    }
  } else {
    let nc=-1,pc=-1,rc=-1,ac=-1,cc=-1;
    for(let r=0;r<Math.min(8,rows.length);r++){
      (rows[r]||[]).forEach((v,c)=>{
        const s=String(v||'').toLowerCase();
        if((s.includes('наименован')||s.includes('номенклатур'))&&nc<0)nc=c;
        if(s.includes('артикул')&&ac<0)ac=c;
        if((s.includes('розниц')||s.includes('ррц'))&&rc<0)rc=c;
        if((s.includes('ваша')||s.includes('опт')||s.includes('мрц'))&&pc<0)pc=c;
        if(s.includes('цена')&&pc<0)pc=c;
        if(s.includes('код')&&cc<0)cc=c;
      });
      if(nc>=0&&pc>=0)break;
    }
    if(nc>=0&&pc>=0){
      for(const row of rows){
        const n=row[nc],p=row[pc],r=rc>=0?row[rc]:0;
        if(n&&typeof n==='string'&&n.trim().length>3&&typeof p==='number'&&p>0)
          items.push({n:n.trim(),u:'шт',p:Math.round(p*100)/100,r:Math.round((r||p)*100)/100,c:cc>=0?String(row[cc]||''):'',a:ac>=0?String(row[ac]||''):''});
      }
    }
  }
  return items;
}

// ===================== EXCEL-STYLE NUMBER INPUT =====================
function NumInput({ value, onChange, style, placeholder='0', decimals=2, className='' }) {
  const [focused, setFocused] = useState(false);
  const [raw, setRaw] = useState('');
  const ref = useRef();

  const fmt = (v) => {
    const n = typeof v === 'number' ? v : parseFloat(v);
    if (!n || isNaN(n) || n === 0) return '';
    return n.toLocaleString('ru-RU', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };

  const parse = (s) => {
    const cleaned = String(s).replace(/\s/g,'').replace(',','.');
    const n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  };

  const handleFocus = () => {
    setFocused(true);
    const n = typeof value === 'number' ? value : parseFloat(value)||0;
    setRaw(n > 0 ? String(n).replace('.',',') : '');
    setTimeout(()=>ref.current?.select(), 0);
  };

  const handleBlur = () => {
    setFocused(false);
    onChange(parse(raw));
  };

  const handleChange = (e) => {
    setRaw(e.target.value.replace(/[^\d,.\-]/g,''));
  };

  const handleKeyDown = (e) => {
    if (e.key==='Tab') ref.current?.blur();
  };

  return (
    <input
      ref={ref}
      className={className}
      value={focused ? raw : fmt(value)}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      placeholder={focused ? '' : placeholder}
      style={{...style, textAlign:'right', fontVariantNumeric:'tabular-nums'}}
    />
  );
}

  const [rtfStatus,setRtfStatus]=useState(null);

  const [priceType,setPriceType]=useState('opt');

  const [kpNum,setKpNum]=useState('');
  const [kpDate,setKpDate]=useState(new Date().toISOString().slice(0,10));
  const [typeCeny,setTypeCeny]=useState('Опт');
  const [zakazchik,setZakazchik]=useState('');
  const [object,setObject]=useState('');
  const [ispolnitel,setIspolnitel]=useState('');
  const [phone,setPhone]=useState('');
  const [projNum,setProjNum]=useState('');
  const [projArea,setProjArea]=useState('');
  const [projCulture,setProjCulture]=useState('');
  const [projRegion,setProjRegion]=useState('');
  const [projWater,setProjWater]=useState('');
  const [logistika,setLogistika]=useState(0);
  const [shefMontazh,setShefMontazh]=useState(0);
  const [shefUnit,setShefUnit]=useState('га');
  const [notes,setNotes]=useState('');
  const [sections,setSections]=useState(SECTIONS.map(d=>({...d,items:[]})));
  const [pdfLoading,setPdfLoading]=useState(false);
  const [tgStatus,setTgStatus]=useState('idle'); // idle|sending|sent|need_start|not_telegram|error
  const [tgError,setTgError]=useState('');
  const [viewPrice,setViewPrice]=useState(null);
  const printRef=useRef();

  // Генерация PDF из предпросмотра. Возвращает jsPDF doc (не сохраняет).
  const buildPdf=useCallback(async()=>{
    const el=document.getElementById('kp-print-area');
    if(!el||!window.html2canvas||!window.jspdf) throw new Error('Откройте предпросмотр');
    if(document.fonts&&document.fonts.ready){ try{ await document.fonts.ready; }catch(e){} }
    const canvas=await window.html2canvas(el,{scale:2.5,useCORS:true,backgroundColor:'#ffffff',logging:false,windowWidth:el.scrollWidth});
    const {jsPDF}=window.jspdf;
    const pdf=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const pageW=210,pageH=297,margin=10;
    const printW=pageW-margin*2, printH=pageH-margin*2;
    const pagePx=Math.floor((printH/printW)*canvas.width);
    let renderedPx=0,pageNum=0;
    while(renderedPx<canvas.height){
      const sliceH=Math.min(pagePx,canvas.height-renderedPx);
      const slice=document.createElement('canvas');
      slice.width=canvas.width; slice.height=sliceH;
      const ctx=slice.getContext('2d');
      ctx.fillStyle='#ffffff'; ctx.fillRect(0,0,slice.width,slice.height);
      ctx.drawImage(canvas,0,renderedPx,canvas.width,sliceH,0,0,canvas.width,sliceH);
      const sliceImg=slice.toDataURL('image/jpeg',0.95);
      const sliceMmH=(sliceH*printW)/canvas.width;
      if(pageNum>0) pdf.addPage();
      pdf.addImage(sliceImg,'JPEG',margin,margin,printW,sliceMmH);
      renderedPx+=sliceH; pageNum++;
    }
    return pdf;
  },[]);

  // Локальное скачивание PDF («Скачать повторно»)
  const savePDF=useCallback(async()=>{
    setPdfLoading(true);
    try{
      const pdf=await buildPdf();
      const slug=(zakazchik||'КП').replace(/[^\wа-яёА-ЯЁ]/g,'_').replace(/_+/g,'_').slice(0,20);
      pdf.save('КП_'+slug+'_'+kpDate+'.pdf');
    }catch(err){ console.error('PDF error:',err); alert('Ошибка создания PDF: '+err.message); }
    setPdfLoading(false);
  },[buildPdf,zakazchik,kpDate]);

  // Отправка PDF в Telegram через backend
  const sendToTelegram=useCallback(async()=>{
    setTgStatus('sending');
    try{
      const pdf=await buildPdf();
      const base64=pdf.output('datauristring'); // data:application/pdf;base64,...
      const tg=window.Telegram&&window.Telegram.WebApp;
      const initData=tg?tg.initData:'';
      if(!initData){
        // Не в Telegram — fallback на скачивание
        const slug=(zakazchik||'КП').replace(/[^\wа-яёА-ЯЁ]/g,'_').replace(/_+/g,'_').slice(0,20);
        pdf.save('КП_'+slug+'_'+kpDate+'.pdf');
        setTgStatus('not_telegram');
        return;
      }
      const resp=await fetch(BACKEND_URL+'/generate-pdf',{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body:JSON.stringify({ initData, pdfBase64:base64, client:zakazchik, date:kpDate }),
      });
      const data=await resp.json();
      if(data.success&&data.telegram_sent){
        setTgStatus('sent');
      }else if(data.need_start){
        setTgStatus('need_start');
      }else{
        setTgStatus('error');
        setTgError(data.error||'Неизвестная ошибка');
      }
    }catch(err){
      console.error('TG send error:',err);
      setTgStatus('error');
      setTgError(err.message);
    }
  },[buildPdf,zakazchik,kpDate]);

  const rtfRef=useRef(), xlsxRef=useRef();

  // Hot items storage
  useEffect(()=>{
    try{ window.storage.get('np_hot2').then(r=>{if(r?.value)setHotItems(JSON.parse(r.value));}).catch(()=>{}); }catch(e){}
  },[]);

  // Навигация по ячейкам цены/количества стрелками и Enter (как в Excel)
  useEffect(()=>{
    const handler=(e)=>{
      const el=e.target;
      if(!(el instanceof HTMLInputElement) || !el.classList.contains('js-nav')) return;
      const k=e.key;
      if(k!=='Enter'&&k!=='ArrowDown'&&k!=='ArrowUp'&&k!=='ArrowLeft'&&k!=='ArrowRight') return;
      // Для влево/вправо двигаемся к соседней ячейке только если курсор у края текста
      const len=el.value.length;
      const atStart=el.selectionStart===0&&el.selectionEnd===0;
      const atEnd=el.selectionStart===len&&el.selectionEnd===len;
      if(k==='ArrowLeft'&&!atStart) return;
      if(k==='ArrowRight'&&!atEnd) return;

      const all=Array.from(document.querySelectorAll('input.js-nav')).filter(x=>x.offsetParent!==null);
      const cur=el.getBoundingClientRect();
      const tol=8;
      const sameCol=r=>Math.abs(r.left-cur.left)<24;
      const sameRow=r=>Math.abs(r.top-cur.top)<12;
      const items=all.filter(x=>x!==el).map(x=>({x,r:x.getBoundingClientRect()}));
      let pool=[],target=null;

      if(k==='Enter'||k==='ArrowDown'){
        pool=items.filter(o=>o.r.top>cur.top+tol);
        const col=pool.filter(o=>sameCol(o.r));
        pool=col.length?col:pool;
        pool.sort((a,b)=>(a.r.top-b.r.top)||(Math.abs(a.r.left-cur.left)-Math.abs(b.r.left-cur.left)));
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowUp'){
        pool=items.filter(o=>o.r.top<cur.top-tol);
        const col=pool.filter(o=>sameCol(o.r));
        pool=col.length?col:pool;
        pool.sort((a,b)=>(b.r.top-a.r.top)||(Math.abs(a.r.left-cur.left)-Math.abs(b.r.left-cur.left)));
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowRight'){
        pool=items.filter(o=>sameRow(o.r)&&o.r.left>cur.left+tol).sort((a,b)=>a.r.left-b.r.left);
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowLeft'){
        pool=items.filter(o=>sameRow(o.r)&&o.r.left<cur.left-tol).sort((a,b)=>b.r.left-a.r.left);
        target=pool[0]&&pool[0].x;
      }
      if(target){
        e.preventDefault();
        e.stopPropagation();
        target.focus();
        try{ target.select(); }catch(_){}
      }
    };
    document.addEventListener('keydown',handler,true);
    return ()=>document.removeEventListener('keydown',handler,true);
  },[]);
  const saveHot=useCallback(items=>{
    try{ window.storage.set('np_hot2',JSON.stringify(items)).catch(()=>{}); }catch(e){}
  },[]);
  const recordUse=useCallback(item=>{
    setHotItems(prev=>{
      const key=(item.a||item.n||'').slice(0,40);
      const ex=prev.find(h=>(h.a||h.n||'').slice(0,40)===key);
      let next=ex?prev.map(h=>(h.a||h.n||'').slice(0,40)===key?{...h,uc:(h.uc||1)+1}:h):[...prev,{...item,uc:1}];
      next=next.sort((a,b)=>(b.uc||0)-(a.uc||0)).slice(0,25);
      saveHot(next); return next;
    });
  },[saveHot]);
  const onRemoveHot=useCallback(key=>{
    setHotItems(prev=>{const n=prev.filter(h=>(h.a||h.n||'').slice(0,40)!==key);saveHot(n);return n;});
  },[saveHot]);

  // XLSX upload
  const handleXLSX=e=>{
    Array.from(e.target.files).forEach(file=>{
      const reader=new FileReader();
      reader.onload=ev=>{
        try{
          const XLSX=window.XLSX;
          if(!XLSX)return;
          const wb=XLSX.read(ev.target.result,{type:'array'});
          const ws=wb.Sheets[wb.SheetNames[0]];
          const rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:null,raw:true});
          const items=parseXLSXFile(rows,file.name);
          if(items.length>0){
            const id='ext_'+Date.now();
            const nm=file.name.replace(/\.[^.]+$/,'').replace(/_/g,' ').slice(0,22);
            setExtraCatalogs(p=>({...p,[id]:{name:nm,items}}));
          }
        }catch(e2){console.error(e2);}
      };
      reader.readAsArrayBuffer(file);
    });
    e.target.value='';
  };

  // RTF
  const handleRTF=e=>{
    const file=e.target.files[0]; if(!file)return; e.target.value='';
    const reader=new FileReader();
    reader.onload=ev=>{
      try{
        const {zone,main}=parseRTF(ev.target.result);
        if(!zone.length&&!main.length){setRtfStatus('error');return;}
        const buckets={magistral:[],poliv:[],krany:[]};
        [...main,...zone].forEach(it=>{
          const sec=clsSec(it.name);
          // Подтягиваем только название и количество. Цену менеджер ставит вручную.
          const item=newItem(ruN(it.name),getU(it.name),it.qty,0,globalMarkup,'','','','');
          (buckets[sec]||buckets.magistral).push(item);
        });
        setSections(prev=>prev.map(s=>buckets[s.id]?{...s,items:buckets[s.id]}:s));
        setRtfStatus('ok');
      }catch{setRtfStatus('error');}
    };
    reader.readAsText(file,'latin1');
  };

  // Item ops — useCallback чтобы не пересоздавать при каждом рендере
  const onUpdate=useCallback((sid,iid,field,val)=>setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:s.items.map(i=>{
    if(i.id!==iid)return i;
    const u={...i};
    const n=typeof val==='number'?val:(parseFloat(String(val).replace(',','.'))||0);
    if(field==='name'||field==='unit'){u[field]=val;}
    else if(field==='qty'){u.qty=n;}
    else if(field==='markup'){u.markup=n;if(u.costPrice>0)u.price=Math.round(u.costPrice*(1+n/100));}
    else if(field==='price'){u.price=n;u.manualPrice=true;}
    else if(field==='costPrice'){u.costPrice=n;u.price=Math.round(n*(1+u.markup/100));u.manualPrice=false;}
    return u;
  })})),[]);

  const onDelete=useCallback((sid,iid)=>setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:s.items.filter(i=>i.id!==iid)})),[]);
  const onAddBlank=useCallback(sid=>setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:[...s.items,newItem('','шт.',0,0,globalMarkup)]})),[globalMarkup]);
  const onAddFromSearch=useCallback((sid,r)=>{
    const cp=priceType==='opt'?r.p:(r.r||r.p);
    const item=newItem(r.n,r.u||'шт.',0,cp,globalMarkup,r.srcId,r.srcName,r.a,r.c);
    setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:[...s.items,item]}));
    recordUse(r);
  },[globalMarkup,priceType,recordUse]);

  const applyMarkup=()=>setSections(prev=>prev.map(s=>({...s,items:s.items.map(i=>({...i,markup:globalMarkup,price:i.costPrice>0?Math.round(i.costPrice*(1+globalMarkup/100)):i.price}))})));

  const secTotal=s=>s.items.reduce((t,i)=>t+(i.qty||0)*(i.price||0),0);
  const grand=sections.reduce((t,s)=>t+secTotal(s),0);
  const logN=parseFloat(logistika)||0, shefN=parseFloat(shefMontazh)||0;
  const final=grand+logN+shefN;
  const totalBuiltin=Object.values(BUILTIN_CATALOGS).reduce((t,s)=>t+s.items.length,0);
  const totalExtra=Object.values(extraCatalogs).reduce((t,s)=>t+s.items.length,0);
  const totalCat=totalBuiltin+totalExtra;
  const allSources=[
    ...Object.entries(BUILTIN_CATALOGS).map(([id,s])=>({id,name:s.name,count:s.items.length})),
    ...Object.entries(extraCatalogs).map(([id,s])=>({id,name:s.name,count:s.items.length})),
  ];

  return(
    <div style={{minHeight:'100vh',background:'#F8FAFC',fontFamily:'Inter,Arial,sans-serif'}}>
      {/* Topbar */}
      <div style={{background:'#0B3A63',color:'#fff',padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 12px rgba(11,58,99,0.25)'}}>
        <div>
          <div style={{fontWeight:600,fontSize:16,letterSpacing:'-0.2px'}}>Новый Полив · Генератор КП</div>
          <div style={{fontSize:11,opacity:.65,marginTop:1}}>База: {totalCat.toLocaleString()} позиций{totalExtra>0?` (+${totalExtra} доп.)`:''}</div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:13,opacity:.85,marginRight:4}}>Итого: <b style={{color:'#9FD0F0'}}>{final.toLocaleString('ru-RU')} ₽</b></span>
          <button onClick={()=>setView('edit')} style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='edit'?'#fff':'rgba(255,255,255,0.15)',color:view==='edit'?'#0B3A63':'#fff'}}>Редактор</button>
          <button onClick={()=>setView('preview')} style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='preview'?'#fff':'rgba(255,255,255,0.15)',color:view==='preview'?'#0B3A63':'#fff'}}>Предпросмотр</button>
        </div>
      </div>

      {view==='preview'?(
        <div style={{maxWidth:900,margin:'0 auto',padding:24}}>
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            <button onClick={()=>setView('edit')} style={{padding:'9px 20px',border:'1px solid #E6EBF0',background:'#fff',color:'#0B3A63',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>← Назад</button>
            <button onClick={savePDF} disabled={pdfLoading}
              style={{padding:'9px 24px',background:pdfLoading?'#5681a8':'#0B3A63',color:'#fff',border:'none',borderRadius:8,cursor:pdfLoading?'wait':'pointer',fontWeight:600,fontSize:14,minWidth:180}}>
              {pdfLoading ? 'Создаётся PDF…' : 'Скачать PDF'}
            </button>
          </div>
          <div id="kp-print-area" style={{background:'#fff',borderRadius:10,padding:'36px 44px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
            <PrintView sections={sections} kpNum={kpNum} kpDate={kpDate} typeCeny={typeCeny}
              zakazchik={zakazchik} object={object} ispolnitel={ispolnitel} phone={phone}
              projNum={projNum} projArea={projArea} projCulture={projCulture} projRegion={projRegion} projWater={projWater}
              logN={logN} shefN={shefN} shefUnit={shefUnit} notes={notes} grand={grand} final={final}/>
          </div>
        </div>
      ):(
        <div style={{maxWidth:1200,margin:'0 auto',padding:'20px 16px'}}>

          {/* Прайсы */}
          <div style={{background:'#fff',borderRadius:10,padding:18,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:700,color:'#0B3A63',marginBottom:6,fontSize:14}}>📚 Встроенные прайсы</div>
            <div style={{fontSize:11,color:'#999',marginBottom:10}}>Кликните на прайс чтобы посмотреть все позиции и цены</div>
            <div style={{display:'flex',gap:8,flexWrap:'wrap',marginBottom:12}}>
              {Object.entries(BUILTIN_CATALOGS).map(([id,src])=>(
                <button key={id} onClick={()=>setViewPrice(id)}
                  style={{padding:'5px 14px',borderRadius:20,fontWeight:600,fontSize:12,color:'#fff',background:srcColor(id),border:'none',cursor:'pointer',display:'flex',alignItems:'center',gap:5}}>
                  📋 {src.name} — {src.items.length} поз.
                </button>
              ))}
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <input ref={xlsxRef} type="file" accept=".xlsx,.xls" multiple style={{display:'none'}} onChange={handleXLSX}/>
              <button onClick={()=>xlsxRef.current.click()} style={{padding:'7px 16px',background:'#EEF4FA',border:'1px solid #B8D4EA',color:'#0B3A63',borderRadius:6,cursor:'pointer',fontWeight:600,fontSize:13}}>
                + Добавить доп. прайс
              </button>
              {Object.entries(extraCatalogs).map(([id,src])=>(
                <div key={id} style={{display:'flex',alignItems:'center',gap:4,padding:'4px 10px',background:'#EEF4FA',borderRadius:16,fontSize:12}}>
                  <span style={{fontWeight:600,color:'#0B3A63'}}>{src.name} ({src.items.length})</span>
                  <button onClick={()=>setExtraCatalogs(p=>{const n={...p};delete n[id];return n;})}
                    style={{background:'none',border:'none',cursor:'pointer',color:'#aaa',fontSize:14}}
                    onMouseEnter={e=>e.currentTarget.style.color='#e74c3c'}
                    onMouseLeave={e=>e.currentTarget.style.color='#aaa'}>✕</button>
                </div>
              ))}
            </div>
          </div>

          {/* Накрутка */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{fontWeight:700,color:'#d07000',fontSize:14}}>Глобальная накрутка</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <NumInput value={globalMarkup} onChange={setGlobalMarkup} decimals={0}
                  style={{...S.inp,width:70,fontSize:18,fontWeight:800,color:'#d07000',border:'2px solid #f39c12',padding:'4px 6px',textAlign:'center'}}/>
                <span style={{fontWeight:700,color:'#d07000',fontSize:18}}>%</span>
                <button onClick={applyMarkup} style={{padding:'6px 14px',background:'#f39c12',color:'#fff',border:'none',borderRadius:5,cursor:'pointer',fontWeight:700,fontSize:13}}>
                  Применить ко всем
                </button>
              </div>
              <div style={{display:'flex',gap:6}}>
                <button onClick={()=>setPriceType('opt')} style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontWeight:600,fontSize:12,background:priceType==='opt'?'#0B3A63':'#e8f3e4',color:priceType==='opt'?'#fff':'#0B3A63'}}>База: Опт</button>
                <button onClick={()=>setPriceType('retail')} style={{padding:'5px 12px',borderRadius:4,border:'none',cursor:'pointer',fontWeight:600,fontSize:12,background:priceType==='retail'?'#0B3A63':'#e8f3e4',color:priceType==='retail'?'#fff':'#0B3A63'}}>База: Розница</button>
              </div>
              <div style={{fontSize:12,color:'#666',background:'#EEF4FA',padding:'6px 12px',borderRadius:6}}>
                1 000 ₽ → <b style={{color:'#0B3A63'}}>{Math.round(1000*(1+globalMarkup/100)).toLocaleString()} ₽</b>
              </div>
            </div>
          </div>

          {/* RTF */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(0,0,0,0.07)',border:rtfStatus==='ok'?'2px solid #2C7FB8':'2px dashed #B8D4EA'}}>
            <div style={{display:'flex',alignItems:'center',gap:14}}>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,fontSize:14,color:'#0B3A63'}}>📐 RTF из Irricad — опционально</div>
                <div style={{fontSize:13,color:'#666',marginTop:2}}>Позиции и количество подтянутся автоматически. Цены проставьте через поиск или вручную.</div>
              </div>
              <input ref={rtfRef} type="file" accept=".rtf" style={{display:'none'}} onChange={handleRTF}/>
              <button onClick={()=>rtfRef.current.click()} style={{padding:'8px 18px',background:rtfStatus==='ok'?'#5a9a47':'#2C7FB8',color:'#fff',border:'none',borderRadius:6,cursor:'pointer',fontWeight:700}}>
                {rtfStatus==='ok'?'✅ Загружен':'📂 Выбрать RTF'}
              </button>
            </div>
            {rtfStatus==='error'&&<div style={{marginTop:8,padding:'6px 12px',background:'#fde8e8',borderRadius:5,fontSize:13,color:'#c0392b'}}>⚠️ Не удалось распознать файл</div>}
          </div>

          {/* Реквизиты */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:700,color:'#0B3A63',marginBottom:12,fontSize:14}}>Реквизиты КП</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
              <div><label style={S.lbl}>Номер КП</label><input style={{...S.inp,width:'100%'}} value={kpNum} onChange={e=>setKpNum(e.target.value)} placeholder="КП-001"/></div>
              <div><label style={S.lbl}>Дата</label><input style={{...S.inp,width:'100%'}} type="date" value={kpDate} onChange={e=>setKpDate(e.target.value)}/></div>
              <div><label style={S.lbl}>Тип цен</label><select style={{...S.inp,width:'100%'}} value={typeCeny} onChange={e=>setTypeCeny(e.target.value)}><option>Опт</option><option>Розница</option><option>Дилер</option></select></div>
              <div><label style={S.lbl}>Объект</label><input style={{...S.inp,width:'100%'}} value={object} onChange={e=>setObject(e.target.value)} placeholder="Виноград, сад..."/></div>
              <div style={{gridColumn:'span 2'}}><label style={S.lbl}>Заказчик</label><input style={{...S.inp,width:'100%'}} value={zakazchik} onChange={e=>setZakazchik(e.target.value)} placeholder='ООО "Альминские холмы"'/></div>
              <div><label style={S.lbl}>Исполнитель</label><input style={{...S.inp,width:'100%'}} value={ispolnitel} onChange={e=>setIspolnitel(e.target.value)}/></div>
              <div><label style={S.lbl}>Телефон</label><input style={{...S.inp,width:'100%'}} value={phone} onChange={e=>setPhone(e.target.value)}/></div>
            </div>
          </div>

          {/* Параметры проекта — карточки в стиле PDF */}
          <div style={{background:'#fff',borderRadius:10,padding:18,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:600,color:'#0B3A63',marginBottom:4,fontSize:15,letterSpacing:'-0.2px'}}>Параметры проекта</div>
            <div style={{fontSize:12,color:'#6B7785',marginBottom:14}}>Показываются на обложке КП в виде карточек. Можно оставить пустыми.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}}>
              {[
                {lbl:'№ проекта', val:projNum, set:setProjNum, ph:'НП-2026-001', acc:'#0B3A63'},
                {lbl:'Площадь', val:projArea, set:setProjArea, ph:'42 га', acc:'#7FAF4D'},
                {lbl:'Культура', val:projCulture, set:setProjCulture, ph:'Виноград', acc:'#2C7FB8'},
                {lbl:'Регион', val:projRegion, set:setProjRegion, ph:'Воронеж', acc:'#7FAF4D'},
                {lbl:'Источник воды', val:projWater, set:setProjWater, ph:'Скважина', acc:'#2C7FB8'},
              ].map((c,i)=>(
                <div key={i} style={{position:'relative',border:'1px solid #E6EBF0',borderRadius:8,padding:'12px 12px 10px',overflow:'hidden',background:'#F8FAFC'}}>
                  <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:c.acc}}></div>
                  <label style={{fontSize:10,color:'#6B7785',textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:600,display:'block',marginBottom:6}}>{c.lbl}</label>
                  <input style={{...S.inp,width:'100%',fontWeight:600,color:'#0B3A63',border:'none',background:'transparent',padding:'2px 0',fontSize:15}} value={c.val} onChange={e=>c.set(e.target.value)} placeholder={c.ph}/>
                </div>
              ))}
            </div>
          </div>

          {/* Секции */}
          {sections.map(sec=>(
            <SectionBlock key={sec.id} sec={sec}
              globalMarkup={globalMarkup} priceType={priceType} hotItems={hotItems}
              onUpdate={onUpdate} onDelete={onDelete} onAddBlank={onAddBlank}
              onAddFromSearch={onAddFromSearch} onRemoveHot={onRemoveHot}
              extraCatalogs={extraCatalogs} totalCatalogCount={totalCat} allSources={allSources}/>
          ))}

          {/* Логистика */}
          <div style={{background:'#fff',borderRadius:10,padding:18,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:600,color:'#0B3A63',marginBottom:14,fontSize:15,letterSpacing:'-0.2px'}}>Логистика и монтаж</div>
            <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1.2fr',gap:14,alignItems:'end'}}>
              <div><label style={S.lbl}>Логистика, ₽</label>
                <NumInput value={logistika} onChange={setLogistika} decimals={2} placeholder="0" style={{...S.inp,width:'100%'}}/>
              </div>
              <div><label style={S.lbl}>Шеф-монтаж или монтаж, ₽</label>
                <div style={{display:'flex',gap:6}}>
                  <NumInput value={shefMontazh} onChange={setShefMontazh} decimals={2} placeholder="0" style={{...S.inp,flex:1}}/>
                  <select value={shefUnit} onChange={e=>setShefUnit(e.target.value)} style={{...S.inp,width:64}}><option>га</option><option>шт.</option><option>к-т.</option></select>
                </div>
              </div>
              <div style={{background:'#0B3A63',borderRadius:10,padding:'14px 18px',color:'#fff'}}>
                <div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Оборудование</span><span style={{fontWeight:600}}>{grand.toLocaleString('ru-RU')} ₽</span></div>
                {logN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Логистика</span><span>{logN.toLocaleString('ru-RU')} ₽</span></div>}
                {shefN>0&&<div style={{display:'flex',justifyContent:'space-between',fontSize:12,marginBottom:4,opacity:.8}}><span>Монтаж</span><span>{shefN.toLocaleString('ru-RU')} ₽</span></div>}
                <div style={{display:'flex',justifyContent:'space-between',alignItems:'baseline',borderTop:'1px solid rgba(255,255,255,0.25)',paddingTop:8,marginTop:6}}>
                  <span style={{fontSize:12,opacity:.85,textTransform:'uppercase',letterSpacing:'0.5px'}}>Итого</span>
                  <span style={{fontWeight:700,fontSize:22,letterSpacing:'-0.5px'}}>{final.toLocaleString('ru-RU')} ₽</span>
                </div>
              </div>
            </div>
            <div style={{marginTop:14}}>
              <label style={S.lbl}>Примечания</label>
              <textarea value={notes} onChange={e=>setNotes(e.target.value)} placeholder="Условия, сроки, гарантия..."
                style={{width:'100%',border:'1px solid #E6EBF0',borderRadius:6,padding:'8px 10px',fontSize:13,minHeight:55,boxSizing:'border-box',resize:'vertical',outline:'none',fontFamily:'Inter,Arial,sans-serif',color:'#1D1D1F'}}/>
            </div>
          </div>

          <button onClick={()=>setView('preview')} style={{width:'100%',padding:15,background:'#0B3A63',color:'#fff',border:'none',borderRadius:10,cursor:'pointer',fontWeight:600,fontSize:16,letterSpacing:'-0.2px'}}>
            Предпросмотр и PDF →
          </button>
        </div>
      )}
      {/* МОДАЛКА ПРОСМОТРА ПРАЙСА */}
      {viewPrice&&(()=>{
        const allCats=Object.assign({},BUILTIN_CATALOGS,extraCatalogs);
        const src=allCats[viewPrice];
        if(!src)return null;
        return(
          <div onClick={()=>setViewPrice(null)}
            style={{position:'fixed',inset:0,background:'rgba(0,0,0,0.5)',zIndex:2000,display:'flex',alignItems:'center',justifyContent:'center',padding:20}}>
            <div onClick={e=>e.stopPropagation()}
              style={{background:'#fff',borderRadius:12,maxWidth:800,width:'100%',maxHeight:'85vh',display:'flex',flexDirection:'column',overflow:'hidden',boxShadow:'0 20px 60px rgba(0,0,0,0.3)'}}>
              <div style={{padding:'14px 18px',background:srcColor(viewPrice),color:'#fff',display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <div>
                  <div style={{fontWeight:800,fontSize:16}}>📋 {src.name}</div>
                  <div style={{fontSize:12,opacity:.85}}>{src.items.length} позиций · кликните на позицию чтобы посмотреть</div>
                </div>
                <button onClick={()=>setViewPrice(null)} style={{background:'rgba(255,255,255,0.2)',border:'none',color:'#fff',borderRadius:6,cursor:'pointer',fontSize:18,width:32,height:32,lineHeight:1}}>✕</button>
              </div>
              <div style={{padding:'8px 14px',borderBottom:'1px solid #eee'}}>
                <input id="price-modal-search" placeholder="Фильтр по названию или артикулу..."
                  onChange={e=>{
                    const q=e.target.value.toLowerCase();
                    const rows=document.querySelectorAll('[data-price-row]');
                    rows.forEach(r=>{
                      const txt=r.getAttribute('data-search');
                      r.style.display=(!q||txt.includes(q))?'flex':'none';
                    });
                  }}
                  style={{...S.inp,width:'100%',padding:'7px 12px',fontSize:14}}/>
              </div>
              <div style={{overflowY:'auto',flex:1}}>
                {src.items.map((it,i)=>(
                  <div key={i} data-price-row data-search={(it.n+' '+(it.a||'')+' '+(it.c||'')).toLowerCase()}
                    style={{padding:'8px 16px',borderBottom:'1px solid #f3f3f3',display:'flex',justifyContent:'space-between',gap:12,alignItems:'center',fontSize:13}}>
                    <div style={{flex:1,minWidth:0}}>
                      <div>{it.n}</div>
                      <div style={{display:'flex',gap:8,marginTop:2}}>
                        {it.a&&<span style={{fontSize:11,color:'#999',fontFamily:'monospace'}}>арт: {it.a}</span>}
                        {it.c&&<span style={{fontSize:11,color:'#bbb',fontFamily:'monospace'}}>код: {it.c}</span>}
                      </div>
                    </div>
                    <div style={{textAlign:'right',whiteSpace:'nowrap'}}>
                      <span style={{color:'#888',fontSize:12}}>опт: </span><b style={{color:'#0B3A63'}}>{it.p.toLocaleString('ru-RU')} ₽</b>
                      {it.r>it.p&&<div style={{fontSize:11,color:'#aaa'}}>розн: {it.r.toLocaleString('ru-RU')} ₽</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          </div>
        );
      })()}

      <style>{`input:focus,textarea:focus,select:focus{border-color:#2C7FB8!important;box-shadow:0 0 0 2px rgba(44,127,184,0.15)} @media print{.no-print{display:none!important}}`}</style>
    </div>
  );
}

    const root=ReactDOM.createRoot(document.getElementById('root'));
    root.render(<KPApp/>);
  </script>
</body>
</html>
