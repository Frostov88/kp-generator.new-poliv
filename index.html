// ===================== SEARCH =====================
function scoreMatch(item, q) {
  const name = item.n.toLowerCase();
  const art = (item.a||'').toLowerCase();
  const code = (item.c||'').toLowerCase();
  if (art === q || code === q) return 100;
  if (art.startsWith(q)) return 90;
  if (name.startsWith(q)) return 85;
  const words = q.split(/\s+/).filter(Boolean);
  if (words.length === 0) return 0;
  const all = words.every(w => name.includes(w) || art.includes(w) || code.includes(w));
  if (all) return 65 + words.length * 5;
  const cnt = words.filter(w => name.includes(w) || art.includes(w)).length;
  return cnt > 0 ? cnt * 12 : 0;
}

function searchAll(catalogs, query, extraCatalogs, srcFilter) {
  const q = query.toLowerCase().trim();
  if (q.length < 2) return [];
  const results = [];
  const allCats = Object.assign({}, catalogs, extraCatalogs);
  for (const [srcId, src] of Object.entries(allCats)) {
    if (srcFilter && srcFilter !== 'all' && srcId !== srcFilter) continue;
    for (const item of src.items) {
      const score = scoreMatch(item, q);
      if (score > 0) results.push({...item, srcId, srcName: src.name, score});
    }
  }
  return results.sort((a,b) => b.score - a.score).slice(0, 50);
}

// ===== НЕЧЁТКИЙ ПОДБОР ЦЕНЫ (нормализация, синонимы, диаметр как ключ) =====
const _NOISE=new Set(['д','d','мм','m','м','шт','бухта','бухте','отрезок','хлыст','диам','ду','ф','для','с','и','в','на','под','тип','класс','sdr','серия','series','ang','flanged','threaded','резьба','резьбовой','фланец','фланцевый','компр','эл','св','атм','бар','atm','bar']);
const _SYN=[
  ['труба',/(труб|трубопровод|\bpe\b|\bпнд\b|\bпэ\b|\bпвх\b|хлыст)/],
  ['капельная',/(капельн|garden\s*tube|drip|streamline|\bлента\b|трубка)/],
  ['лейфлет',/(лейфлет|layflat|\bl\.?f\b|рукав)/],
  ['кран',/(\bкран|клапан|valve|\braf\b|гидрант|задвижк|вентил|крановая)/],
  ['муфта',/муфт/],['отвод',/(отвод|угол)/],['тройник',/тройник/],
  ['старт',/(старт|коннектор)/],['заглушка',/(заглушк|восьмерк)/],
  ['седло',/(седл|врезк)/],['фитинг',/фитинг/],['фильтр',/фильтр/],
  ['насос',/насос/],['скоба',/скоб/],['редуктор',/(редукц|редуктор|понижающ|\bprv\b)/],
];
function _canon(s){
  s=String(s||'').toLowerCase().replace(/ё/g,'е');
  s=s.replace(/\([^)]*\)/g,' ').replace(/[(),«»"'’]/g,' ').replace(/[×xх*]/g,' ');
  s=s.replace(/(\d),(\d)/g,'$1.$2');
  return s.replace(/\s+/g,' ').trim();
}
// Стандартные диаметры (ПЭ-трубы, капельная, клапаны) — служат «якорем» подбора
const STD_DIA=new Set([16,20,25,32,40,50,63,75,80,90,100,110,125,140,160,180,200,225,250,280,315]);
const _LF=new Set([2,3,4,6]); // дюймовые размеры лейфлета
function _tok(s){
  const c=_canon(s);
  const nums=(c.match(/\d+(?:\.\d+)?/g)||[]).map(Number);
  const cats=_SYN.filter(([k,re])=>re.test(c)).map(([k])=>k);
  const words=c.replace(/\d+(?:\.\d+)?/g,' ').split(/[^a-zа-я]+/).filter(w=>w.length>1&&!_NOISE.has(w));
  const dias=nums.filter(n=>STD_DIA.has(n));
  let dia=dias.length?Math.max(...dias):null;     // основной типоразмер = крупнейший стандартный диаметр
  if(!dia && cats.includes('капельная')) dia=16;  // капельная по умолчанию 16 мм (Streamline/Garden tube)
  let mat=null;                                    // материал трубы: ПЭ/ПНД ≠ ПВХ/клеевая
  if(/пнд|пэ|\bpe\b/.test(c)) mat='pe';
  else if(/пвх|pvc|aquaviva|клеев/.test(c)) mat='pvc';
  let inch=null;                                   // дюймовый размер лейфлета (2/3/4/6)
  if(cats.includes('лейфлет')){ const f=nums.find(n=>_LF.has(n)); if(f!=null) inch=f; }
  const seq=nums.filter(n=>Number.isInteger(n)).join('.');   // сигнатура размеров, напр. 16.20.16
  return {nums,cats,words:new Set(words),dia,mat,inch,seq};
}
// Типоразмерные категории: для них диаметр решает
const _SIZED=new Set(['труба','муфта','отвод','тройник','капельная','кран','редуктор','седло','старт','заглушка']);
const _EQUIP=new Set(['кран','редуктор','насос','фильтр']); // оборудование: бренд/модель важнее диаметра
function fuzzyScore(qt,item){
  const it=item._tk||(item._tk=_tok((item.n||'')+' '+(item.a||'')+' '+(item.c||'')));
  if(qt.cats.length && !qt.cats.some(c=>it.cats.includes(c))) return 0;     // категория обязательна
  if(qt.cats.includes('лейфлет')){
    if(!it.cats.includes('лейфлет')) return 0;
    if(qt.inch && it.inch && qt.inch!==it.inch) return 0;
    return 40 + ((qt.inch && it.inch && qt.inch===it.inch)?45:0);
  }
  const sized=qt.cats.some(c=>_SIZED.has(c));
  if(sized && qt.dia && it.dia && qt.dia!==it.dia) return 0;                 // другой диаметр — другая позиция
  if(qt.cats.includes('труба') && qt.mat==='pe' && it.mat!=='pe') return 0;
  if(qt.cats.includes('труба') && qt.mat==='pvc' && it.mat==='pe') return 0;
  const equip=qt.cats.some(c=>_EQUIP.has(c));
  // покрытие по словам названия (мост англ/рус идёт через категории и числа)
  let wIn=0; qt.words.forEach(w=>{if(it.words.has(w))wIn++;});
  const covW=qt.words.size?wIn/qt.words.size:0;
  // совпадение всех размеров, не только основного диаметра
  const iset=new Set(it.nums); let numMatch=0; qt.nums.forEach(n=>{if(iset.has(n))numMatch++;});
  let s=0;
  if(qt.cats.length) s+=18;
  if(qt.dia && it.dia && qt.dia===it.dia){ if(!(equip && wIn===0)) s+=30; } // диаметр — сигнал, но не доминирующий
  s+=Math.round(covW*46);                                   // совпадение слов названия — главный сигнал
  if(qt.words.size>=1 && wIn===qt.words.size) s+=22;        // все слова запроса найдены в позиции
  s+=Math.min(22,numMatch*9);                               // совпавшие размеры
  if(qt.seq && qt.seq.length>=4 && it.seq.includes(qt.seq)) s+=18;  // точная последовательность размеров (16.20.16)
  if(sized && qt.nums.length && numMatch===0 && !qt.dia) s-=18;     // есть конкретный размер, но ни один не совпал
  if(/набор|комплект|\bset\b/i.test(item.n||'')) s-=25;     // проектные позиции — поштучные, а не наборы
  if(!qt.dia && !qt.words.size && qt.nums.length){ const h=qt.nums.filter(n=>iset.has(n)).length; s+=Math.min(30,h*10); }
  return s;
}
function fuzzyBest(catalogs,extra,name){
  const qt=_tok(name); if(!qt.cats.length && !qt.nums.length) return null;
  const allCats=Object.assign({},catalogs,extra); let best=null,bestS=0;
  for(const [srcId,src] of Object.entries(allCats)) for(const item of src.items){
    const sc=fuzzyScore(qt,item); if(sc>bestS){ bestS=sc; best={...item,srcId,srcName:src.name,score:sc}; }
  }
  return (best && bestS>=60)? best : null;
}
// Все релевантные совпадения (та же позиция в разных прайсах), ранжированные по близости
function fuzzyAll(catalogs,extra,name,limit){
  const qt=_tok(name); if(!qt.cats.length && !qt.nums.length) return [];
  const allCats=Object.assign({},catalogs,extra); const out=[];
  for(const [srcId,src] of Object.entries(allCats)) for(const item of src.items){
    const sc=fuzzyScore(qt,item); if(sc>=60) out.push({...item,srcId,srcName:src.name,score:sc});
  }
  out.sort((a,b)=>b.score-a.score);
  return out.slice(0,limit||20);
}

// Получить все позиции конкретного прайса (для просмотра)
function getAllFromSource(catalogs, extraCatalogs, srcId) {
  const allCats = Object.assign({}, catalogs, extraCatalogs);
  const src = allCats[srcId];
  if (!src) return [];
  return src.items.map(item => ({...item, srcId, srcName: src.name}));
}

// Разбор спецификации IrriCAD (RTF Bill of Materials) → список материалов с разделами
function parseRtfBom(text){
  const chunks=[];
  const re=/\\shptxt(.*?)(?=\{\\sp|\}\})/gs; let m;
  while((m=re.exec(text))!==null){
    const c=m[1].replace(/\\[a-z]+(-?\d+)?[ ]?/g,'').replace(/[{}]/g,'').replace(/\r?\n/g,' ').trim();
    if(c&&c.length>1&&!c.startsWith('0100'))chunks.push(c);
  }
  const isNum=s=>/^[\d][\d\s.,\u00a0]*$/.test(String(s).trim());
  const pq=s=>parseFloat(String(s).replace(/[\s\u00a0]/g,'').replace(',','.'))||0;
  const isMat=s=>/pe\s*\d+\/\d+/i.test(s)||/garden tube|drip|капель/i.test(s)||/netafim|raf|клапан|гидрант|valve/i.test(s);
  function mapMat(s){
    let mm;
    if((mm=s.match(/pe\s*(\d+)\/(\d+)/i))) return {name:'Труба ПЭ d.'+mm[1]+'/'+mm[2], unit:'м.', sec:'magistral', key:'pe'+mm[1]+'/'+mm[2]};
    if(/garden tube|drip|капель/i.test(s)) return {name:'Трубка капельная 16мм шаг 0.5 1.5 л/ч', unit:'м.', sec:'poliv', key:'drip'};
    if(/netafim|raf|клапан|гидрант|valve|nelson/i.test(s)) return {name:s.replace(/\s+/g,' ').trim(), unit:'шт.', sec:'krany', key:'valve:'+s.toLowerCase().replace(/\s+/g,'')};
    return {name:s.replace(/\s+/g,' ').trim(), unit:'шт.', sec:'magistral', key:'x:'+s.toLowerCase()};
  }
  let mode=null;
  const acc=new Map();
  for(let i=0;i<chunks.length;i++){
    const c=chunks[i];
    if(c==='Zone Items'){mode='zone';continue;}
    if(c==='Mainline'){mode='main';continue;}
    if(c==='Unconnected'){mode='zone';continue;}
    if(/Total Capital Cost/i.test(c)){mode=null;continue;}
    if(!mode||!isNum(c)) continue;
    const qty=pq(c); if(qty<=0) continue;
    const nb = isMat(chunks[i+1]||'') ? chunks[i+1] : (isMat(chunks[i-1]||'') ? chunks[i-1] : null);
    if(!nb) continue;
    const mp=mapMat(nb);
    const ex=acc.get(mp.key)||{name:mp.name,unit:mp.unit,sec:mp.sec,qty:0};
    ex.qty+=qty; acc.set(mp.key,ex);
  }
  return [...acc.values()];
}

// ===================== XLSX PARSER =====================
function parseXLSXFile(rows, filename) {
  const fn = filename.toLowerCase();
  const hdr = rows.slice(0,6).map(r=>(r||[]).map(c=>String(c||'').toLowerCase()).join(' ')).join(' ');
  const items = [];
  if (fn.includes('вал')||fn.includes('val')||hdr.includes('valfex')) {
    for (const row of rows.slice(4)) {
      const n=row[10],u=row[11],p=row[16],c=row[3],a=row[6];
      if(n&&typeof n==='string'&&n.trim().length>3&&typeof p==='number'&&p>0)
        items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:String(c||''),a:String(a||'')});
    }
  } else if (fn.includes('клеев')||hdr.includes('альфакод')||hdr.includes('ррц')) {
    for (const row of rows.slice(3)) {
      const n=row[3],u=row[4],retail=row[6],our=row[8],c=row[1],a=row[2];
      if(n&&typeof n==='string'&&n.trim().length>3){
        const p=typeof our==='number'&&our>0?our:(typeof retail==='number'&&retail>0?retail:0);
        const r=typeof retail==='number'&&retail>0?retail:p;
        if(p>0)items.push({n:n.trim(),u:String(u||'шт'),p:Math.round(p*100)/100,r:Math.round(r*100)/100,c:String(c||''),a:String(a||'')});
      }
    }
  } else if (fn.includes('грин')||fn.includes('green')) {
    for (const row of rows.slice(8)) {
      const a=row[1],name=row[2],p=row[6];
      if(name&&typeof name==='string'&&name.trim().length>3&&typeof p==='number'&&p>0)
        items.push({n:name.replace(/\n/g,' ').trim().slice(0,110),u:'шт',p:Math.round(p*100)/100,r:Math.round(p*100)/100,c:'',a:String(a||'')});
    }
  } else {
    let nc=-1,pc=-1,rc=-1,ac=-1,cc=-1;
    for(let r=0;r<Math.min(8,rows.length);r++){
      (rows[r]||[]).forEach((v,c)=>{
        const s=String(v||'').toLowerCase();
        if((s.includes('наименован')||s.includes('номенклатур'))&&nc<0)nc=c;
        if(s.includes('артикул')&&ac<0)ac=c;
        if((s.includes('розниц')||s.includes('ррц'))&&rc<0)rc=c;
        if((s.includes('ваша')||s.includes('опт')||s.includes('мрц'))&&pc<0)pc=c;
        if(s.includes('цена')&&pc<0)pc=c;
        if(s.includes('код')&&cc<0)cc=c;
      });
      if(nc>=0&&pc>=0)break;
    }
    if(nc>=0&&pc>=0){
      for(const row of rows){
        const n=row[nc],p=row[pc],r=rc>=0?row[rc]:0;
        if(n&&typeof n==='string'&&n.trim().length>3&&typeof p==='number'&&p>0)
          items.push({n:n.trim(),u:'шт',p:Math.round(p*100)/100,r:Math.round((r||p)*100)/100,c:cc>=0?String(row[cc]||''):'',a:ac>=0?String(row[ac]||''):''});
      }
    }
  }
  return items;
}

// ===================== EXCEL-STYLE NUMBER INPUT =====================
function NumInput({ value, onChange, style, placeholder='0', decimals=2, className='' }) {
  const [focused, setFocused] = useState(false);
  const [raw, setRaw] = useState('');
  const ref = useRef();

  const fmt = (v) => {
    const n = typeof v === 'number' ? v : parseFloat(v);
    if (!n || isNaN(n) || n === 0) return '';
    return n.toLocaleString('ru-RU', { minimumFractionDigits: decimals, maximumFractionDigits: decimals });
  };

  const parse = (s) => {
    const cleaned = String(s).replace(/\s/g,'').replace(',','.');
    const n = parseFloat(cleaned);
    return isNaN(n) ? 0 : n;
  };

  const handleFocus = () => {
    setFocused(true);
    const n = typeof value === 'number' ? value : parseFloat(value)||0;
    setRaw(n > 0 ? String(n).replace('.',',') : '');
    setTimeout(()=>ref.current?.select(), 0);
  };

  const handleBlur = () => {
    setFocused(false);
    onChange(parse(raw));
  };

  const handleChange = (e) => {
    setRaw(e.target.value.replace(/[^\d,.\-]/g,''));
  };

  const handleKeyDown = (e) => {
    if (e.key==='Tab') ref.current?.blur();
  };

  return (
    <input
      ref={ref}
      className={className}
      value={focused ? raw : fmt(value)}
      onChange={handleChange}
      onFocus={handleFocus}
      onBlur={handleBlur}
      onKeyDown={handleKeyDown}
      inputMode="decimal"
      placeholder={focused ? '' : placeholder}
      style={{...style, textAlign:'right', fontVariantNumeric:'tabular-nums'}}
    />
  );
}

  const beginDrag=useCallback((idx,e)=>{
    e.preventDefault(); e.stopPropagation();
    const cx=(e.touches&&e.touches[0])?e.touches[0].clientX:e.clientX;
    const cy=(e.touches&&e.touches[0])?e.touches[0].clientY:e.clientY;

    dragRef.current={from:idx,to:idx};
    setDrag({from:idx,to:idx,item:sec.items[idx]});
    try{ document.body.style.cursor='grabbing'; document.body.style.userSelect='none'; }catch(_){}
    const move=(ev)=>{
      const y=(ev.touches&&ev.touches[0])?ev.touches[0].clientY:ev.clientY;
      const x=(ev.touches&&ev.touches[0])?ev.touches[0].clientX:ev.clientX;

      if(dragRef.current && dragRef.current.to!==to){ dragRef.current={...dragRef.current,to}; setDrag(d=>d?{...d,to}:d); }
    };

      document.removeEventListener('pointermove',move);
      document.removeEventListener('pointerup',up);
      try{ document.body.style.cursor=''; document.body.style.userSelect=''; }catch(_){}
      const d=dragRef.current; dragRef.current=null; setDrag(null);

// ===== Карта рельефа из Google Earth (KML/KMZ) =====
function _relNum(n){ const v=Math.round((+n||0)*10)/10; return v.toLocaleString('ru-RU'); }

// Яркая (кислотная) гипсометрическая палитра: t∈[0..1] (низина→возвышение) → [r,g,b]
function _reliefColor(t){
  t=Math.max(0,Math.min(1,isFinite(t)?t:0));
  const stops=[[57,255,20],[150,255,0],[240,255,0],[255,170,0],[255,70,30],[220,20,90]];
  const ps=[0,0.22,0.45,0.68,0.86,1];
  for(let i=1;i<ps.length;i++){ if(t<=ps[i]){ const a=stops[i-1],b=stops[i],f=(t-ps[i-1])/(ps[i]-ps[i-1]||1); return [a[0]+(b[0]-a[0])*f,a[1]+(b[1]-a[1])*f,a[2]+(b[2]-a[2])*f].map(Math.round); } }
  return stops[stops.length-1];
}

// Достать точки {lon,lat,alt}, ВСЕ внешние полигоны и имя из текста KML
function _kmlParse(text){
  const pts=[]; const polys=[]; let name='';
  try{
    const xml=new DOMParser().parseFromString(text,'application/xml');
    const nm=xml.querySelector('Document>name')||xml.querySelector('Folder>name')||xml.querySelector('Placemark>name')||xml.querySelector('name');
    if(nm&&nm.textContent) name=nm.textContent.trim();
    const ce=xml.getElementsByTagName('coordinates');
    for(let i=0;i<ce.length;i++){
      ce[i].textContent.trim().split(/\s+/).forEach(tok=>{ const p=tok.split(','); if(p.length>=2){ const lon=+p[0],lat=+p[1],alt=p.length>=3?+p[2]:0; if(isFinite(lon)&&isFinite(lat)) pts.push({lon,lat,alt:isFinite(alt)?alt:0}); } });
    }
    const all=xml.getElementsByTagName('*');
    for(let i=0;i<all.length;i++){ const t=all[i].tagName||''; if(/(^|:)coord$/i.test(t)){ const q=all[i].textContent.trim().split(/\s+/).map(Number); if(q.length>=2&&isFinite(q[0])&&isFinite(q[1])) pts.push({lon:q[0],lat:q[1],alt:isFinite(q[2])?q[2]:0}); } }
    // все внешние границы полигонов (для маски/контура)
    const rings=xml.querySelectorAll('Polygon outerBoundaryIs LinearRing coordinates, Polygon LinearRing coordinates');
    rings.forEach(rg=>{ const ring=rg.textContent.trim().split(/\s+/).map(tok=>{const p=tok.split(',');return [+p[0],+p[1]];}).filter(c=>isFinite(c[0])&&isFinite(c[1])); if(ring.length>=3) polys.push(ring); });
  }catch(e){}
  return {pts,polys,name};
}

function _bboxOf(polys,pts){
  let a=Infinity,b=-Infinity,c=Infinity,d=-Infinity; const add=(lon,lat)=>{ if(lon<a)a=lon; if(lon>b)b=lon; if(lat<c)c=lat; if(lat>d)d=lat; };
  (polys||[]).forEach(r=>r.forEach(p=>add(p[0],p[1])));
  if(!isFinite(a)&&pts) pts.forEach(p=>add(p.lon,p.lat));
  return {minLon:a,maxLon:b,minLat:c,maxLat:d};
}
function _inRings(lon,lat,polys){
  for(const r of polys){ let ins=false; for(let i=0,j=r.length-1;i<r.length;j=i++){ const xi=r[i][0],yi=r[i][1],xj=r[j][0],yj=r[j][1]; if(((yi>lat)!==(yj>lat))&&(lon<(xj-xi)*(lat-yi)/(yj-yi||1e-12)+xi)) ins=!ins; } if(ins) return true; } return false;
}
// Сетка точек внутри полигонов (~target шт.) для запроса высот
function _demGrid(polys,bbox,target){
  const {minLon,maxLon,minLat,maxLat}=bbox;
  const aspect=((maxLon-minLon)*Math.cos((minLat+maxLat)/2*Math.PI/180))/((maxLat-minLat)||1e-9);
  let cols=Math.max(4,Math.round(Math.sqrt(target*Math.abs(aspect)||target)));
  let rows=Math.max(4,Math.round(target/cols));
  const locs=[]; const useMask=polys&&polys.length;
  for(let r=0;r<rows;r++) for(let c=0;c<cols;c++){
    const lon=minLon+(maxLon-minLon)*((c+0.5)/cols), lat=minLat+(maxLat-minLat)*((r+0.5)/rows);
    if(!useMask || _inRings(lon,lat,polys)) locs.push({lon,lat});
  }
  return locs;
}
// Запрос высот из модели рельефа: OpenTopoData (SRTM) → резерв Open-Elevation
async function fetchElevations(locs){
  const out=new Array(locs.length).fill(null), chunk=100;
  for(let i=0;i<locs.length;i+=chunk){
    const part=locs.slice(i,i+chunk); let got=null;
    for(const ds of ['srtm30m','mapzen']){
      try{
        const q=part.map(p=>p.lat.toFixed(6)+','+p.lon.toFixed(6)).join('|');
        const ctl=new AbortController(), tm=setTimeout(()=>ctl.abort(),15000);
        const res=await fetch('https://api.opentopodata.org/v1/'+ds+'?interpolation=bilinear&locations='+encodeURIComponent(q),{signal:ctl.signal});
        clearTimeout(tm);
        if(res.ok){ const j=await res.json(); if(j&&j.results){ got=j.results.map(r=>r&&typeof r.elevation==='number'?r.elevation:null); break; } }
      }catch(e){}
    }
    if(!got){
      try{
        const ctl=new AbortController(), tm=setTimeout(()=>ctl.abort(),20000);
        const res=await fetch('https://api.open-elevation.com/api/v1/lookup',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({locations:part.map(p=>({latitude:p.lat,longitude:p.lon}))}),signal:ctl.signal});
        clearTimeout(tm);
        if(res.ok){ const j=await res.json(); if(j&&j.results) got=j.results.map(r=>r&&typeof r.elevation==='number'?r.elevation:null); }
      }catch(e){}
    }
    if(got) for(let k=0;k<part.length;k++) out[i+k]=got[k];
    if(i+chunk<locs.length) await new Promise(r=>setTimeout(r,1100));
  }
  return out;
}

async function parseReliefFile(file, onProgress){
  const lname=String(file.name||'').toLowerCase();
  let text='';
  if(lname.endsWith('.kmz')){
    const buf=new Uint8Array(await file.arrayBuffer());
    if(!(window.fflate&&window.fflate.unzipSync)) throw new Error('библиотека распаковки KMZ не загружена');
    const files=window.fflate.unzipSync(buf);
    let key=Object.keys(files).find(k=>/\.kml$/i.test(k)&&!/__macosx/i.test(k))||Object.keys(files).find(k=>/\.kml$/i.test(k));
    if(!key) throw new Error('в KMZ не найден KML');
    text=new TextDecoder('utf-8').decode(files[key]);
  } else { text=await file.text(); }
  const {pts:kmlPts,polys,name}=_kmlParse(text);
  if(!kmlPts.length&&!polys.length) throw new Error('в файле нет координат');
  // Есть ли в KML РЕАЛЬНЫЙ рельеф (много разных ненулевых высот)?
  const nz=kmlPts.filter(p=>Math.abs(p.alt)>0.05);
  const uniq=new Set(nz.map(p=>Math.round(p.alt*10)/10));
  let samples, source;
  if(nz.length>=8 && uniq.size>=5){
    samples=nz.map(p=>({lon:p.lon,lat:p.lat,alt:p.alt})); source='kml';
  } else {
    // KML без рельефа (контур «на земле») → берём реальные высоты из модели рельефа (DEM)
    const bbox=_bboxOf(polys,kmlPts);
    if(!isFinite(bbox.minLon)) throw new Error('не удалось определить границы участка');
    let locs=_demGrid([],bbox,100);
    if(locs.length>100){ const step=Math.ceil(locs.length/100); locs=locs.filter((_,i)=>i%step===0); }
    if(onProgress) onProgress('Запрос высот рельефа из модели SRTM ('+locs.length+' точек)…');
    const elev=await fetchElevations(locs);
    samples=[]; for(let i=0;i<locs.length;i++){ if(elev[i]!=null&&isFinite(elev[i])) samples.push({lon:locs[i].lon,lat:locs[i].lat,alt:elev[i]}); }
    if(samples.length<4) throw new Error('не удалось получить высоты рельефа из сервиса (нет ответа или участок без данных). Проверьте интернет и повторите попытку');
    source='dem';
  }
  const sorted=samples.map(p=>p.alt).sort((a,b)=>a-b);
  const q=p=>sorted[Math.min(sorted.length-1,Math.max(0,Math.round((sorted.length-1)*p)))];
  let min,max;
  if(sorted.length>=25){ min=q(0.02); max=q(0.98); } else { min=sorted[0]; max=sorted[sorted.length-1]; }
  if(!(max>min)){ min=sorted[0]; max=sorted[sorted.length-1]; }
  return {pts:samples,polys,name,min,max,diff:max-min,source,count:samples.length};
}

// Рендер карты рельефа в canvas (IDW-интерполяция) → {dataURL,w,h}
function renderReliefCanvas(data, maxW){
  const pts=data.pts; const polys=(data.polys&&data.polys.length)?data.polys:null;
  let minLon=Infinity,maxLon=-Infinity,minLat=Infinity,maxLat=-Infinity;
  pts.forEach(p=>{ if(p.lon<minLon)minLon=p.lon; if(p.lon>maxLon)maxLon=p.lon; if(p.lat<minLat)minLat=p.lat; if(p.lat>maxLat)maxLat=p.lat; });
  if(polys) polys.forEach(r=>r.forEach(c=>{ if(c[0]<minLon)minLon=c[0]; if(c[0]>maxLon)maxLon=c[0]; if(c[1]<minLat)minLat=c[1]; if(c[1]>maxLat)maxLat=c[1]; }));
  const padLon=(maxLon-minLon)*0.05||0.0006, padLat=(maxLat-minLat)*0.05||0.0006;
  minLon-=padLon;maxLon+=padLon;minLat-=padLat;maxLat+=padLat;
  const midLat=(minLat+maxLat)/2;
  const lonSpan=(maxLon-minLon)*Math.cos(midLat*Math.PI/180)||1, latSpan=(maxLat-minLat)||1;
  let W=Math.round(maxW||720), H=Math.round(W*(latSpan/lonSpan));
  H=Math.max(260,Math.min(H,Math.round(W*1.45)));
  const cv=document.createElement('canvas'); cv.width=W; cv.height=H;
  const ctx=cv.getContext('2d');
  let sp=pts; if(sp.length>800){ const step=Math.ceil(sp.length/800); sp=pts.filter((_,i)=>i%step===0); }
  const X=lon=>(lon-minLon)/(maxLon-minLon)*W, Yp=lat=>(1-(lat-minLat)/(maxLat-minLat))*H;
  const sx=sp.map(p=>X(p.lon)), sy=sp.map(p=>Yp(p.lat)), sa=sp.map(p=>p.alt);
  const min=data.min,max=data.max,rng=(max-min)||1;
  const polysPx=polys?polys.map(r=>r.map(c=>[X(c[0]),Yp(c[1])])):null;
  const inPoly=(x,y)=>{ if(!polysPx)return true; for(const r of polysPx){ let ins=false; for(let i=0,j=r.length-1;i<r.length;j=i++){ const xi=r[i][0],yi=r[i][1],xj=r[j][0],yj=r[j][1]; if(((yi>y)!==(yj>y))&&(x<(xj-xi)*(y-yi)/(yj-yi||1e-9)+xi)) ins=!ins; } if(ins)return true; } return false; };
  const cell=2, img=ctx.createImageData(W,H);
  for(let gy=0;gy<H;gy+=cell){ for(let gx=0;gx<W;gx+=cell){
    if(!inPoly(gx+cell/2,gy+cell/2)) continue;
    let num=0,den=0,exact=null;
    for(let k=0;k<sx.length;k++){ const dx=gx-sx[k],dy=gy-sy[k],d2=dx*dx+dy*dy; if(d2<1.2){exact=sa[k];break;} const w=1/(d2+1e-3); num+=w*sa[k]; den+=w; }
    const v=exact!=null?exact:(den?num/den:min), col=_reliefColor((v-min)/rng);
    for(let yy=gy;yy<Math.min(gy+cell,H);yy++){ for(let xx=gx;xx<Math.min(gx+cell,W);xx++){ const idx=(yy*W+xx)*4; img.data[idx]=col[0];img.data[idx+1]=col[1];img.data[idx+2]=col[2];img.data[idx+3]=255; } }
  }}
  ctx.putImageData(img,0,0);
  if(polysPx){ ctx.strokeStyle='rgba(11,58,99,0.9)'; ctx.lineWidth=2.4; polysPx.forEach(r=>{ ctx.beginPath(); r.forEach((c,i)=>{ i?ctx.lineTo(c[0],c[1]):ctx.moveTo(c[0],c[1]); }); ctx.closePath(); ctx.stroke(); }); }
  if(sa.length){ let iMin=0,iMax=0; sa.forEach((a,i)=>{ if(a<sa[iMin])iMin=i; if(a>sa[iMax])iMax=i; });
    const mark=(i,c)=>{ ctx.fillStyle=c; ctx.beginPath(); ctx.arc(sx[i],sy[i],8,0,7); ctx.fill(); ctx.strokeStyle='#fff'; ctx.lineWidth=2.6; ctx.stroke(); };
    mark(iMax,'#B3005A'); mark(iMin,'#1AE000'); }
  ctx.strokeStyle='#E6EBF0'; ctx.lineWidth=1; ctx.strokeRect(0.5,0.5,W-1,H-1);
  return {dataURL:cv.toDataURL('image/png'),w:W,h:H};
}

// 3D-рендер рельефа: наклонная проекция высотной сетки с затенением → {dataURL,w,h}
function renderRelief3D(data, maxW){
  const pts=data.pts, polys=(data.polys&&data.polys.length)?data.polys:null;
  let minLon=Infinity,maxLon=-Infinity,minLat=Infinity,maxLat=-Infinity;
  pts.forEach(p=>{ if(p.lon<minLon)minLon=p.lon; if(p.lon>maxLon)maxLon=p.lon; if(p.lat<minLat)minLat=p.lat; if(p.lat>maxLat)maxLat=p.lat; });
  if(polys) polys.forEach(r=>r.forEach(c=>{ if(c[0]<minLon)minLon=c[0]; if(c[0]>maxLon)maxLon=c[0]; if(c[1]<minLat)minLat=c[1]; if(c[1]>maxLat)maxLat=c[1]; }));
  const padLon=(maxLon-minLon)*0.03||0.0006, padLat=(maxLat-minLat)*0.03||0.0006;
  minLon-=padLon;maxLon+=padLon;minLat-=padLat;maxLat+=padLat;
  const midLat=(minLat+maxLat)/2;
  const lonM=(maxLon-minLon)*111320*Math.cos(midLat*Math.PI/180)||1, latM=(maxLat-minLat)*111320||1;
  const aspY=latM/lonM;
  const gxf=lon=>(lon-minLon)/(maxLon-minLon), gyf=lat=>(lat-minLat)/(maxLat-minLat);
  const sxn=pts.map(p=>gxf(p.lon)), syn=pts.map(p=>gyf(p.lat)), sa=pts.map(p=>p.alt);
  const minA=data.min,maxA=data.max,rng=(maxA-minA)||1;
  const N=80, NW=N+1;
  const idw=(u,v)=>{ let num=0,den=0; for(let k=0;k<sxn.length;k++){ const dx=u-sxn[k],dy=(v-syn[k])*aspY,d2=dx*dx+dy*dy; if(d2<1e-7) return sa[k]; const w=1/(d2+1e-7); num+=w*sa[k]; den+=w; } return den?num/den:minA; };
  const hAt=(u,v)=>Math.max(0,Math.min(1,(idw(u,v)-minA)/rng));
  const Hh=new Array(NW*NW);
  for(let j=0;j<NW;j++) for(let i=0;i<NW;i++){ Hh[j*NW+i]=hAt(i/N,j/N); }
  // сглаживание высотной сетки — убирает резкие «обрывы», делает плавные склоны
  for(let pass=0;pass<4;pass++){ const T=Hh.slice();
    for(let j=0;j<NW;j++) for(let i=0;i<NW;i++){ let s=0,n=0;
      for(let dj=-1;dj<=1;dj++) for(let di=-1;di<=1;di++){ const jj=j+dj,ii=i+di; if(jj<0||jj>=NW||ii<0||ii>=NW) continue; const wt=(di===0&&dj===0)?4:((di===0||dj===0)?2:1); s+=wt*T[jj*NW+ii]; n+=wt; }
      Hh[j*NW+i]=s/n; }
  }
  const yaw=-35*Math.PI/180, cA=Math.cos(yaw), sA=Math.sin(yaw);
  const tilt=14*Math.PI/180, cT=Math.cos(tilt), sT=Math.sin(tilt);
  const zExag=0.18;
  const proj=(u,v,hN)=>{ const x=(u-0.5), y=(v-0.5)*aspY, z=hN*zExag; const xa=x*cA - y*sA, ya=x*sA + y*cA; return {sx:xa, sy:-(ya*sT)-z*cT, depth:ya}; };
  // габариты проекции: поверхность + углы основания (z=0)
  let pminX=Infinity,pmaxX=-Infinity,pminY=Infinity,pmaxY=-Infinity;
  const acc=p=>{ if(p.sx<pminX)pminX=p.sx; if(p.sx>pmaxX)pmaxX=p.sx; if(p.sy<pminY)pminY=p.sy; if(p.sy>pmaxY)pmaxY=p.sy; };
  for(let j=0;j<NW;j++) for(let i=0;i<NW;i++) acc(proj(i/N,j/N,Hh[j*NW+i]));
  [[0,0],[1,0],[1,1],[0,1]].forEach(c=>acc(proj(c[0],c[1],0)));
  const W=Math.round(maxW||1100), cbW=92, pad=18, plotW=W-cbW;
  const sc=(plotW-2*pad)/((pmaxX-pminX)||1);
  let Hpx=Math.round((pmaxY-pminY)*sc+2*pad); Hpx=Math.max(130,Math.min(Hpx,Math.round(W*0.31)));
  const cv=document.createElement('canvas'); cv.width=W; cv.height=Hpx; const ctx=cv.getContext('2d');
  const tx=x=>pad+(x-pminX)*sc, ty=y=>pad+(y-pminY)*sc;
  const lm=Math.hypot(-0.5,-0.72,1), L=[-0.5/lm,-0.72/lm,1/lm];
  const dxw=1/N, dyw=aspY/N;
  const RGB=c=>'rgb('+(c[0]|0)+','+(c[1]|0)+','+(c[2]|0)+')';
  // основание-тень (z=0)
  const b0=proj(0,0,0),b1=proj(1,0,0),b2=proj(1,1,0),b3=proj(0,1,0);
  ctx.fillStyle='rgba(180,186,196,0.45)'; ctx.beginPath(); ctx.moveTo(tx(b0.sx),ty(b0.sy)); ctx.lineTo(tx(b1.sx),ty(b1.sy)); ctx.lineTo(tx(b2.sx),ty(b2.sy)); ctx.lineTo(tx(b3.sx),ty(b3.sy)); ctx.closePath(); ctx.fill();
  // список полигонов (стенки + поверхность) с сортировкой far->near
  const quads=[];
  // боковые стенки (юбка) по 4 краям
  const wall=(u1,v1,u2,v2)=>{ const h1=hAt(u1,v1),h2=hAt(u2,v2);
    const t1=proj(u1,v1,h1),t2=proj(u2,v2,h2),bb1=proj(u1,v1,0),bb2=proj(u2,v2,0);
    quads.push({kind:'w',depth:(t1.depth+t2.depth)/2,h:(h1+h2)/2,p:[[tx(t1.sx),ty(t1.sy)],[tx(t2.sx),ty(t2.sy)],[tx(bb2.sx),ty(bb2.sy)],[tx(bb1.sx),ty(bb1.sy)]]}); };
  for(let i=0;i<N;i++){ wall(i/N,0,(i+1)/N,0); wall(i/N,1,(i+1)/N,1); }
  for(let j=0;j<N;j++){ wall(0,j/N,0,(j+1)/N); wall(1,j/N,1,(j+1)/N); }
  // поверхность
  for(let j=0;j<N;j++) for(let i=0;i<N;i++){
    const h00=Hh[j*NW+i],h10=Hh[j*NW+i+1],h01=Hh[(j+1)*NW+i],h11=Hh[(j+1)*NW+i+1];
    const p00=proj(i/N,j/N,h00),p10=proj((i+1)/N,j/N,h10),p11=proj((i+1)/N,(j+1)/N,h11),p01=proj(i/N,(j+1)/N,h01);
    const dzx=((h10+h11)-(h00+h01))/2*zExag, dzy=((h01+h11)-(h00+h10))/2*zExag;
    let nx=-dzx*dyw, ny=-dzy*dxw, nz=dxw*dyw; const nm=Math.hypot(nx,ny,nz)||1; nx/=nm;ny/=nm;nz/=nm;
    let br=0.55+0.6*(nx*L[0]+ny*L[1]+nz*L[2]); br=Math.max(0.4,Math.min(1.2,br));
    quads.push({kind:'s',depth:(p00.depth+p10.depth+p01.depth+p11.depth)/4,h:(h00+h10+h01+h11)/4,br,p:[[tx(p00.sx),ty(p00.sy)],[tx(p10.sx),ty(p10.sy)],[tx(p11.sx),ty(p11.sy)],[tx(p01.sx),ty(p01.sy)]]});
  }
  quads.sort((a,b)=>b.depth-a.depth);
  quads.forEach(q=>{
    ctx.beginPath(); ctx.moveTo(q.p[0][0],q.p[0][1]); for(let k=1;k<4;k++) ctx.lineTo(q.p[k][0],q.p[k][1]); ctx.closePath();
    if(q.kind==='s'){ const col=_reliefColor(q.h); ctx.fillStyle=RGB([col[0]*q.br,col[1]*q.br,col[2]*q.br]); ctx.strokeStyle=ctx.fillStyle; ctx.lineWidth=0.8; ctx.fill(); ctx.stroke(); }
    else { const col=_reliefColor(q.h); const g=ctx.createLinearGradient((q.p[0][0]+q.p[1][0])/2,(q.p[0][1]+q.p[1][1])/2,(q.p[2][0]+q.p[3][0])/2,(q.p[2][1]+q.p[3][1])/2); g.addColorStop(0,RGB([col[0]*0.72,col[1]*0.72,col[2]*0.72])); g.addColorStop(1,RGB([col[0]*0.34,col[1]*0.34,col[2]*0.34])); ctx.fillStyle=g; ctx.strokeStyle=RGB([col[0]*0.3,col[1]*0.3,col[2]*0.3]); ctx.lineWidth=0.5; ctx.fill(); ctx.stroke(); }
  });
  // контур поля, «надетый» на поверхность
  if(polys){ ctx.strokeStyle='rgba(15,20,35,0.85)'; ctx.lineWidth=2.2; polys.forEach(r=>{ ctx.beginPath(); let started=false; r.forEach(c=>{ const u=gxf(c[0]),v=gyf(c[1]); if(u<-0.02||u>1.02||v<-0.02||v>1.02){return;} const p=proj(u,v,hAt(Math.max(0,Math.min(1,u)),Math.max(0,Math.min(1,v)))+0.012); const X=tx(p.sx),Y=ty(p.sy); started?ctx.lineTo(X,Y):ctx.moveTo(X,Y); started=true; }); ctx.stroke(); }); }
  // цветовая шкала справа (как Irricad)
  const cbX=W-cbW+14, cbY0=pad+10, cbY1=Hpx-pad-10, barW=18;
  const grad=ctx.createLinearGradient(0,cbY0,0,cbY1);
  for(let s=0;s<=12;s++){ const c=_reliefColor(1-s/12); grad.addColorStop(s/12,RGB(c)); }
  ctx.fillStyle=grad; ctx.fillRect(cbX,cbY0,barW,cbY1-cbY0);
  ctx.strokeStyle='#9aa3ad'; ctx.lineWidth=1; ctx.strokeRect(cbX,cbY0,barW,cbY1-cbY0);
  ctx.fillStyle='#2b2b2b'; ctx.font='15px sans-serif'; ctx.textBaseline='middle'; ctx.textAlign='left';
  for(let s=0;s<=4;s++){ const f=s/4, y=cbY1+(cbY0-cbY1)*f, val=minA+(maxA-minA)*f; ctx.fillText(Math.round(val)+' м', cbX+barW+5, y); }
  ctx.fillText('Z', cbX, cbY0-12);
  return {dataURL:cv.toDataURL('image/png'),w:W,h:Hpx};
}

}
// Восстановление картинок рельефа из точек (перерендер при загрузке черновика)
function reliefHydrate(r){
  if(!r) return null;
  if(r.img) return r;                       // картинки уже есть (старый формат)
  if(!(r.pts&&r.pts.length)) return null;   // нечего рендерить
  try{
    const data={pts:r.pts,polys:r.polys,min:r.min,max:r.max,diff:r.diff,name:r.name,count:r.count,source:r.source};
    const r2=renderReliefCanvas(data,900);

  }catch(e){ console.error('relief hydrate',e); return null; }
}

// RTF → читаемый текст (раскодировка \uN и \'XX(cp1251), переводы строк, удаление управляющих слов)
function _rtfText(raw){
  let s=String(raw||'');
  s=s.replace(/\\u(-?\d+)\s?\??/g,(m,n)=>{ let c=parseInt(n,10); if(c<0)c+=65536; return String.fromCharCode(c); });
  s=s.replace(/\\'([0-9a-fA-F]{2})/g,(m,h)=>{ const b=parseInt(h,16); return b<0x80?String.fromCharCode(b):String.fromCharCode(_CP1251HI[b-0x80]); });
  s=s.replace(/\\par[d]?\b/g,'\n').replace(/\\line\b/g,'\n').replace(/\\cell\b/g,'\t').replace(/\\tab\b/g,'\t').replace(/\\row\b/g,'\n');
  s=s.replace(/\\[a-zA-Z]+-?\d*\s?/g,' ').replace(/[{}]/g,' ');
  return s.replace(/[ \t]+/g,' ').replace(/ *\n */g,'\n');
}

var IRR_FIELDS=[
  {k:'rowSpace',  label:'Расстояние между рядами',           unit:'м',       re:/расстоян[а-яё]*\s*между\s*ряд[а-яё]*/i},

  {k:'maxFlow',   label:'Максимальный расход системы',       unit:'м³/ч',    re:/максимальн[а-яё]*\s*расход\s*систем[а-яё]*/i},
  {k:'srcPress',  label:'Необходимое давление источника',    unit:'м',       re:/необходим[а-яё]*\s*давлен[а-яё]*\s*источник[а-яё]*/i},
];
function parseIrrData(text){
  const t=String(text||'').replace(/\u00A0/g,' ');
  const out={}; let found=0;
  IRR_FIELDS.forEach(f=>{
    const m=f.re.exec(t); if(!m) return;
    const tail=t.slice(m.index+m[0].length, m.index+m[0].length+90);
    if(f.text){ const w=tail.replace(/^[\s:.,–\-|]+/,'').split(/[\n\r\t]|\s{2,}/)[0].trim(); if(w&&!/^[\d.,]/.test(w)&&!/^(га|м|л\/ч|мм|ч|день|№)\b/i.test(w)&&w.length<=40){ out[f.k]=w; found++; } }
    else { const nm=tail.match(/(?:^|[\s|:.])(-?\d+(?:[.,]\d+)?)(?=[\s|]|$)/); if(nm){ out[f.k]=nm[1].replace(',', '.'); found++; } }
  });
  out.__found=found;
  return out;
}

// Собирает КП напрямую через jsPDF + autoTable (текст выделяется, строки не рвутся).
function _hexRgb(h){h=h.replace('#','');return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)];}
// ===== Экспорт КП в Excel (XLSX) =====
function makeXlsx(d){
  const X=window.XLSX; if(!X) throw new Error('Библиотека XLSX не загрузилась — проверьте интернет');
  const rows=[]; const merges=[];
  const push=r=>{ rows.push(r); return rows.length-1; };
  // Шапка документа
  let r=push(['ООО «ТД Новый Полив» — Коммерческое предложение'+(d.kpNum?' № '+d.kpNum:'')]); merges.push({s:{r,c:0},e:{r,c:5}});
  let dateStr=''; try{ dateStr=new Date(d.kpDate+'T12:00:00').toLocaleDateString('ru-RU'); }catch(e){ dateStr=d.kpDate||''; }
  push(['Дата', dateStr, '', 'Тип цен', d.typeCeny||'', '']);
  push(['Заказчик', d.zakazchik||'', '', (d.projNum?'№ проекта':'Объект'), d.projNum||d.object||'', '']);
  push(['Исполнитель', d.ispolnitel||'', '', 'Телефон', d.phone||'', '']);
  const proj=[['Площадь',d.projArea],['Культура',d.projCulture],['Регион',d.projRegion],['Источник воды',d.projWater]].filter(p=>p[1]&&String(p[1]).trim());
  if(proj.length){ push([]); proj.forEach(p=>push([p[0], String(p[1]), '', '', '', ''])); }
  push([]);
  // Таблица спецификации
  const headRow=push(['№','Наименование','Кол-во','Ед.','Цена, ₽','Сумма, ₽']);
  let n=0; const secHeaderRows=[], subtotalRows=[], numRows=[];
  d.sections.forEach(sec=>{
    const active=(sec.items||[]).filter(i=>i.name&&(i.qty>0));
    if(!active.length) return;
    const sr=push([String(sec.title||'').toUpperCase()]); merges.push({s:{r:sr,c:0},e:{r:sr,c:5}}); secHeaderRows.push(sr);
    let secSum=0;
    active.forEach(it=>{ n++; const sum=(it.qty||0)*(it.price||0); secSum+=sum;
      const rr=push([n, it.name||'', it.qty||0, it.unit||'шт.', it.price||0, sum]); numRows.push(rr);
    });
    const str_=push(['','Подытог','','','',secSum]); subtotalRows.push(str_);
  });
  push([]);
  const totals=[['Оборудование, всего', d.grand||0]];
  if(d.logN>0)totals.push(['Логистика', d.logN]);
  if(d.montN>0)totals.push(['Монтаж', d.montN]);
  if(d.shefN>0)totals.push(['Шеф-монтаж', d.shefN]);
  const totalRows=[];
  totals.forEach(t=>{ totalRows.push(push(['',t[0],'','','',t[1]])); });
  const grandRow=push(['','ИТОГО ПО ПРОЕКТУ','','','',d.final||d.grand||0]);
  let perHaRow=-1;
  if(d.perHaOn){ const ha=_areaHa(d.projArea); if(ha>0){ perHaRow=push(['','Стоимость на 1 га ('+_relNum(ha)+' га)','','','',(d.final||d.grand||0)/ha]); } }
  if(d.hydroOn){ const hrows=_hydraulics(d.irr); if(hrows){ push([]); const hr=push(['Гидравлические параметры системы']); merges.push({s:{r:hr,c:0},e:{r:hr,c:5}}); hrows.forEach(rw=>push([rw[0], rw[1], '', '', '', ''])); } }
  if(d.notes&&String(d.notes).trim()){ push([]); const nr=push(['Примечания: '+d.notes]); merges.push({s:{r:nr,c:0},e:{r:nr,c:5}}); }

  const ws=X.utils.aoa_to_sheet(rows);
  ws['!merges']=merges;
  ws['!cols']=[{wch:5},{wch:64},{wch:10},{wch:7},{wch:14},{wch:16}];
  // числовые форматы: цена/сумма 2 знака, количество без хвоста
  const setFmt=(rr,cc,z)=>{ const ref=X.utils.encode_cell({r:rr,c:cc}); if(ws[ref]&&typeof ws[ref].v==='number'){ ws[ref].z=z; } };
  numRows.forEach(rr=>{ setFmt(rr,2,'#,##0.###'); setFmt(rr,4,'#,##0.00'); setFmt(rr,5,'#,##0.00'); });
  subtotalRows.forEach(rr=>setFmt(rr,5,'#,##0.00'));
  totalRows.forEach(rr=>setFmt(rr,5,'#,##0.00'));
  setFmt(grandRow,5,'#,##0.00');
  if(perHaRow>=0) setFmt(perHaRow,5,'#,##0.00');
  const wb=X.utils.book_new();
  X.utils.book_append_sheet(wb,ws,'КП');
  return wb;
}

function makeVectorPdf(d){
  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
  if(typeof doc.autoTable!=='function') throw new Error('Плагин таблиц (autoTable) не загрузился — проверьте интернет');
  // Встроенный шрифт DejaVu — сабсет: нет U+00A0 (нераз. пробел), «·» (U+00B7), «×» (U+00D7).
  // jsPDF обрывает строку на отсутствующем глифе — поэтому заменяем их на присутствующие.
  const SAFE=s=>String(s==null?'':s).replace(/[\u00A0\u202F\u2009]/g,' ').replace(/\u00D7/g,'x').replace(/\u00B3/g,'3').replace(/\u00B2/g,'2').replace(/[\u00B7\u2022]/g,'-');
  const _docText=doc.text.bind(doc);
  doc.text=function(){ const a=Array.prototype.slice.call(arguments); if(typeof a[0]==='string')a[0]=SAFE(a[0]); else if(Array.isArray(a[0]))a[0]=a[0].map(SAFE); return _docText.apply(null,a); };
  const FONT='Inter';
  try{
    doc.addFileToVFS('Inter.ttf',INTER_REGULAR); doc.addFont('Inter.ttf',FONT,'normal');
    doc.addFileToVFS('InterB.ttf',INTER_BOLD); doc.addFont('InterB.ttf',FONT,'bold');
  }catch(e){ console.warn('font',e); }
  const PRIMARY=_hexRgb('#0B3A63'),SECOND=_hexRgb('#2C7FB8'),ACCENT=_hexRgb('#7FAF4D'),BG=_hexRgb('#F8FAFC'),TEXT=_hexRgb('#1D1D1F'),DIV=_hexRgb('#E6EBF0'),MUTED=_hexRgb('#6B7785');
  const W=210,ML=14,RIGHT=210-14,CW=210-28;
  const _sp=s=>String(s).replace(/[\u00A0\u202F\u2009]/g,' ');
  const money=n=>{n=parseFloat(n)||0;if(!n)return'';return _sp(n.toLocaleString('ru-RU',{minimumFractionDigits:2,maximumFractionDigits:2}))+' \u20BD';};
  const qtyF=n=>{n=parseFloat(n)||0;if(!n)return'';return _sp(n%1===0?n.toLocaleString('ru-RU'):n.toLocaleString('ru-RU',{maximumFractionDigits:1}));};
  const setF=(st,sz,c)=>{doc.setFont(FONT,st);doc.setFontSize(sz);doc.setTextColor(c[0],c[1],c[2]);};
  const draw=c=>doc.setDrawColor(c[0],c[1],c[2]);
  const fill=c=>doc.setFillColor(c[0],c[1],c[2]);
  let y=14;

  // Разделители-точки: символа «·» в шрифте нет — рисуем маленький кружок
  const dotR=(segs,xR,yy)=>{ const ws=segs.map(s=>doc.getTextWidth(s)),dg=1.4; const tot=ws.reduce((a,b)=>a+b,0)+(segs.length-1)*dg*2; let x=xR-tot; segs.forEach((s,i)=>{ doc.text(s,x,yy); x+=ws[i]; if(i<segs.length-1){ x+=dg; fill(MUTED); doc.circle(x,yy-0.85,0.42,'F'); x+=dg; } }); };
  const dotL=(segs,xL,yy)=>{ const dg=1.3; let x=xL; segs.forEach((s,i)=>{ doc.text(s,x,yy); x+=doc.getTextWidth(s); if(i<segs.length-1){ x+=dg; fill(MUTED); doc.circle(x,yy-0.7,0.4,'F'); x+=dg; } }); };

  // ШАПКА (логотип ≈20мм, реквизиты выровнены по верху)
  try{ doc.addImage('data:image/png;base64,'+LOGO_B64,'PNG',ML,8.5,58,20); }catch(e){}
  setF('bold',11.25,PRIMARY); doc.text('ООО «ТД Новый Полив»',RIGHT,13.5,{align:'right'});
  setF('normal',8,MUTED);
  dotR(['г. Воронеж, ул. Пеше-Стрелецкая, 74А','ИНН 3665825656'],RIGHT,18.9);
  dotR(['+7-962-331-65-65','new-poliv@yandex.ru','new-poliv.ru'],RIGHT,23.4);
  draw(PRIMARY); doc.setLineWidth(0.4); doc.line(ML,33,RIGHT,33);
  y=42;

  // ЗАГОЛОВОК
  setF('bold',8.25,SECOND); doc.setCharSpace(0.5);
  doc.text(('Коммерческое предложение'+(d.kpNum?' № '+d.kpNum:'')).toUpperCase(),ML,y); doc.setCharSpace(0);
  y+=9; setF('bold',22.5,PRIMARY); doc.text('Система капельного орошения',ML,y);
  y+=4.8; draw(SECOND); doc.setLineWidth(0.4); doc.line(ML,y,RIGHT,y);
  fill(ACCENT); for(let i=0;i<=5;i++){ doc.circle(ML+CW*(i/5),y,0.9,'F'); }
  y+=8.5; setF('normal',9.75,MUTED); doc.text('Проектирование, оборудование и монтаж под ключ',ML,y);
  y+=11.5;

  // РЕКВИЗИТЫ (+ опц. карта рельефа справа)
  let dateStr=''; try{ dateStr=_sp(new Date(d.kpDate+'T12:00:00').toLocaleDateString('ru-RU',{day:'2-digit',month:'long',year:'numeric'})); }catch(e){ dateStr=d.kpDate||''; }
  const cards=[['Площадь',d.projArea,ACCENT],['Культура',d.projCulture,SECOND],['Регион',d.projRegion,ACCENT],['Источник воды',d.projWater,SECOND]].filter(c=>c[1]&&String(c[1]).trim());
  const RELIEF = d.reliefOn && d.relief && d.relief.img;

// ===================== ПАРСЕР ЗАЯВОК (DOCX / PDF / XLSX) =====================
// Классификатор раздела по русскому названию
function ruSection(name){
  const l=String(name||'').toLowerCase();
  if(/насос|фильтр|станц|гидроцикл|песчан|инжектор|вентури/.test(l)) return 'nasos';
  if(/\bкран|задвижк|клапан|вентил|затвор|сбросник/.test(l)) return 'krany';
  if(/капельн|капельниц|\bлент|трубк|поливн|эмиттер|старт|спринклер|микроджет|форсунк/.test(l)) return 'poliv';
  return 'magistral';
}
// Извлечь количество из ячейки («10шт», «10 шт», 10, «50»)
function cellQty(c){
  if(typeof c==='number') return c>0?c:0;
  if(typeof c==='string'){ const m=c.match(/(\d+(?:[.,]\d+)?)/); if(m){const n=parseFloat(m[1].replace(',','.')); return n>0?n:0;} }
  return 0;
}
// Извлечь денежную сумму («613,63», «61 363,00», «1 663,00 ₽», число)
function parseMoney(c){
  if(typeof c==='number') return c>0?c:0;
  if(typeof c!=='string') return 0;
  let s=c.replace(/[^\d.,\s]/g,'').replace(/\s+/g,'');
  if(!s) return 0;
  if(s.indexOf(',')>=0 && s.indexOf('.')>=0){ s=s.replace(/\./g,'').replace(',','.'); }
  else if(s.indexOf(',')>=0){ s=s.replace(',','.'); }
  const n=parseFloat(s);
  return (isNaN(n)||n<0)?0:n;
}
function isNameCell(s){
  if(typeof s!=='string') return false;
  s=s.trim();
  if(s.length<3) return false;
  if(/^[\d\s.,xх*/+\-]+$/.test(s)) return false;
  const t=s.toLowerCase();
  if(/^(наименование|номенклатура|товар|позиция|описание|кол-?во|количество|цена|сумма|ед|единица|итого|всего|подытог|№|n|no|п\/п|номер)$/.test(t)) return false;
  if(/^(итого|всего|подытог)\b/.test(t)) return false;
  return true;
}
// Извлечь пары «название → количество» из произвольного текста (PDF/плоский DOCX)
function parseRequestLines(text){
  const out=[];
  const lines=String(text||'').split(/\r?\n/);
  const U='(?:шт|штук|штука|ед|компл|комплект|пар|пара|м|мп|пог\\.?\\s?м|метр|метров|м2|м²|кв\\.?м|кг|тонн|т|л|литр|уп|упак|упаковк|рул|рулон|бухт|бухта)';
  const unitRe=new RegExp('(\\d+(?:[.,]\\d+)?)\\s*('+U+')\\b','i');
  for(let raw of lines){
    let line=raw.replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim();
    if(line.length<4) continue;
    if(/^(наименование|товар|позиция|кол-?во|количество|цена|сумма|итого|всего|№|n|no|п\/п|ассортимент|описание|артикул)\b/i.test(line)) continue;
    line=line.replace(/^\s*\d{1,3}\s*[.)]\s+/,'');
    const cleanName=s=>s.replace(/^\d{1,3}\s+/,'').replace(/^[A-Z][A-Z0-9]{3,}\b\s*/,'').replace(/^[\s.\-—:]+|[\s.\-—:]+$/g,'').trim();
    // 1) «число + единица» — самый надёжный признак количества
    const m=line.match(unitRe);
    if(m){
      const qty=parseFloat(m[1].replace(',','.'));
      const name=cleanName(line.slice(0,m.index));
      const unit=m[2];
      // цена = первая денежная сумма после количества (напр. «… 100 компл 613,63 61 363,00» → 613,63)
      const tail=line.slice(m.index+m[0].length);
      const pm=tail.match(/\d[\d \u00a0]*[.,]\d{1,2}\b/);
      const price=pm?parseMoney(pm[0]):0;
      if(name.length>=3 && qty>0 && qty<1e7){ out.push({name,qty,unit,price}); continue; }
    }
    // 2) ровно одно число во всей строке → это количество
    const nums=line.match(/\d+(?:[.,]\d+)?/g)||[];
    if(nums.length===1){
      const qty=parseFloat(nums[0].replace(',','.'));
      const name=cleanName(line.replace(nums[0],' '));
      if(name.length>=3 && qty>0 && qty<1e7){ out.push({name,qty}); continue; }
    }
  }
  return out;
}
// Найти строку-заголовок таблицы и индексы колонок «название» / «количество» / «единица» / «цена»
function findRequestHeader(rows){
  const n=Math.min(rows.length,20);
  for(let i=0;i<n;i++){
    const row=rows[i]; if(!Array.isArray(row)) continue;
    let nameCol=-1,qtyCol=-1,unitCol=-1,priceCol=-1;
    row.forEach((c,j)=>{
      const s=(typeof c==='string'?c:'').toLowerCase();
      if(nameCol<0 && /наимен|номенклатур|товар|позиц|описан/.test(s)) nameCol=j;
      if(qtyCol<0 && /кол-?во|кол\.|количеств/.test(s)) qtyCol=j;
      if(unitCol<0 && /(^|[^а-я])ед\.?($|[^а-я])|едениц|единиц/.test(s)) unitCol=j;
      if(priceCol<0 && /цена|стоимост|прайс/.test(s) && !/сумма/.test(s)) priceCol=j;
    });
    if(nameCol>=0&&qtyCol>=0) return {hi:i,nameCol,qtyCol,unitCol,priceCol};
  }
  return null;
}
// Извлечь позиции из строк таблицы. При наличии заголовка — берём строго колонки «название»/«количество» (+ единица/цена, если есть)
function parseRequestRows(rows){
  const out=[];
  const hdr=findRequestHeader(rows);
  if(hdr){
    for(let r=hdr.hi+1;r<rows.length;r++){
      const row=rows[r]; if(!Array.isArray(row)) continue;
      const name=row[hdr.nameCol];
      if(!isNameCell(name)) continue;
      const qty=cellQty(row[hdr.qtyCol]);
      const unit=(hdr.unitCol>=0 && typeof row[hdr.unitCol]==='string')?row[hdr.unitCol].trim():'';
      const price=hdr.priceCol>=0?parseMoney(row[hdr.priceCol]):0;
      out.push({name:String(name).trim(),qty:qty>0?qty:0,unit,price});
    }
    return out;
  }
  // Без заголовка: имя = самая длинная текстовая ячейка, количество = первое число СТРОГО после неё (без отката на №)
  for(const row of rows){
    if(!Array.isArray(row)) continue;
    let name='', nameIdx=-1, nameLen=0;
    row.forEach((c,i)=>{
      if(typeof c==='string'){ const s=c.trim(); if(isNameCell(s) && s.length>nameLen){ name=s; nameLen=s.length; nameIdx=i; } }
    });
    if(!name) continue;
    let qty=0;
    for(let i=nameIdx+1;i<row.length;i++){ const q=cellQty(row[i]); if(q>0){ qty=q; break; } }
    out.push({name:name.trim(),qty});
  }
  return out;
}
// Разобрать HTML (mammoth convertToHtml для DOCX) в массив строк-ячеек таблиц
function parseHtmlTableRows(html){
  const rows=[];
  try{
    const doc=new DOMParser().parseFromString(html,'text/html');
    doc.querySelectorAll('table tr').forEach(tr=>{
      const cells=Array.from(tr.querySelectorAll('td,th')).map(td=>td.textContent.replace(/\u00a0/g,' ').replace(/\s+/g,' ').trim());
      if(cells.some(Boolean)) rows.push(cells);
    });
  }catch(e){}
  return rows;
}
// Восстановить текст из PDF (pdf.js getTextContent) — группировка по строкам по координате Y
function reconstructPdfText(tc){
  const rows={};
  (tc.items||[]).forEach(it=>{
    if(!it.transform) return;
    const y=Math.round(it.transform[5]);
    (rows[y]||(rows[y]=[])).push({x:it.transform[4],s:it.str});
  });
  return Object.keys(rows).map(Number).sort((a,b)=>b-a)
    .map(y=>rows[y].sort((a,b)=>a.x-b.x).map(o=>o.s).join(' ').replace(/\s+/g,' ').trim())
    .filter(Boolean).join('\n');
}

// Тумблер в стиле iOS
function Toggle({on,onChange,label,sub}){
  return (
    <div onClick={()=>onChange(!on)} style={{display:'flex',alignItems:'center',gap:10,cursor:'pointer',userSelect:'none'}}>
      <span role="switch" aria-checked={on} style={{position:'relative',flexShrink:0,width:44,height:26,borderRadius:13,background:on?'#34C759':'#E4E7EC',transition:'background .22s ease',boxShadow:'inset 0 0 0 1px rgba(0,0,0,0.04)'}}>

  );
}

    const printW=pageW-margin*2, printH=pageH-margin*2;
    const pagePx=Math.floor((printH/printW)*canvas.width);
    let renderedPx=0,pageNum=0;
    while(renderedPx<canvas.height){
      const sliceH=Math.min(pagePx,canvas.height-renderedPx);
      const slice=document.createElement('canvas');
      slice.width=canvas.width; slice.height=sliceH;

  // Навигация по ячейкам цены/количества стрелками и Enter (как в Excel)
  useEffect(()=>{
    const handler=(e)=>{
      const el=e.target;
      if(!(el instanceof HTMLInputElement) || !el.classList.contains('js-nav')) return;
      const k=e.key;
      if(k!=='Enter'&&k!=='ArrowDown'&&k!=='ArrowUp'&&k!=='ArrowLeft'&&k!=='ArrowRight') return;
      // Для влево/вправо двигаемся к соседней ячейке только если курсор у края текста
      const len=el.value.length;
      const atStart=el.selectionStart===0&&el.selectionEnd===0;
      const atEnd=el.selectionStart===len&&el.selectionEnd===len;
      if(k==='ArrowLeft'&&!atStart) return;
      if(k==='ArrowRight'&&!atEnd) return;

      const all=Array.from(document.querySelectorAll('input.js-nav')).filter(x=>x.offsetParent!==null);
      const cur=el.getBoundingClientRect();
      const tol=8;
      const sameCol=r=>Math.abs(r.left-cur.left)<24;
      const sameRow=r=>Math.abs(r.top-cur.top)<12;
      const items=all.filter(x=>x!==el).map(x=>({x,r:x.getBoundingClientRect()}));
      let pool=[],target=null;

      if(k==='Enter'||k==='ArrowDown'){
        pool=items.filter(o=>o.r.top>cur.top+tol);
        const col=pool.filter(o=>sameCol(o.r));
        pool=col.length?col:pool;
        pool.sort((a,b)=>(a.r.top-b.r.top)||(Math.abs(a.r.left-cur.left)-Math.abs(b.r.left-cur.left)));
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowUp'){
        pool=items.filter(o=>o.r.top<cur.top-tol);
        const col=pool.filter(o=>sameCol(o.r));
        pool=col.length?col:pool;
        pool.sort((a,b)=>(b.r.top-a.r.top)||(Math.abs(a.r.left-cur.left)-Math.abs(b.r.left-cur.left)));
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowRight'){
        pool=items.filter(o=>sameRow(o.r)&&o.r.left>cur.left+tol).sort((a,b)=>a.r.left-b.r.left);
        target=pool[0]&&pool[0].x;
      }else if(k==='ArrowLeft'){
        pool=items.filter(o=>sameRow(o.r)&&o.r.left<cur.left-tol).sort((a,b)=>b.r.left-a.r.left);
        target=pool[0]&&pool[0].x;
      }
      if(target){
        e.preventDefault();
        e.stopPropagation();
        target.focus();
        try{ target.select(); }catch(_){}
      }
    };

  const genFittings=useCallback(()=>{

        else rows.push({sel:true,name:'Муфта соединительная компр. d.'+d,qty:Math.ceil(pipeLenByDiam[d]/coil),unit:'шт.',sec:'magistral'});
      });
      // Редукции: электросварной редукционный фитинг (зона пайки), иначе компрессионная переходная муфта
      for(let i=0;i<diams.length-1;i++){ const w=isWeld(diams[i])||isWeld(diams[i+1]); rows.push({sel:true,name:(w?'Фитинг электросварной редукционный d.':'Муфта переходная компр. d.')+diams[i]+'×d.'+diams[i+1],qty:1,unit:'шт.',sec:'magistral'}); }
      diams.forEach(d=>rows.push({sel:true,name:(isWeld(d)?'Отвод электросварной d.':'Отвод компр. d.')+d,qty:blocks>0?blocks:0,unit:'шт.',sec:'magistral'}));
    }
    if(lat>0){
      rows.push({sel:true,name:'Старт-коннектор с уплотнительным кольцом 16мм',qty:lat,unit:'шт.',sec:'poliv'});
      rows.push({sel:true,name:'Заглушка-восьмерка 16мм',qty:lat,unit:'шт.',sec:'poliv'});
      rows.push({sel:true,name:'Муфта ремонтная 16мм',qty:Math.round(lat*1.5),unit:'шт.',sec:'poliv'});
    }
    if(blocks>0){
      rows.push({sel:true,name:'Седловая врезка',qty:blocks,unit:'шт.',sec:'poliv'});
      rows.push({sel:true,name:'Крановая группа',qty:blocks,unit:'шт.',sec:'krany'});
    }
    // Скоба Е40 (крепёж) = длина капельной трубки ÷ шаг крепления, округление вверх. Для подземной трубки галочку снять.
    if(dripLen>0&&clamp>0) rows.push({sel:true,name:'Скоба Е40',qty:Math.ceil(dripLen/clamp),unit:'шт.',sec:'poliv'});
    setFitRows(rows);
  },[pipeLenByDiam,dripLen,fitCoil,fitBlocks,fitLaterals,fitClamp,pipeMat]);
  const setFitRow=useCallback((i,patch)=>setFitRows(rows=>rows.map((r,j)=>j===i?{...r,...patch}:r)),[]);
  // Оценка фитингов как % от стоимости труб
  const pipeCostSum=useMemo(()=>sections.flatMap(s=>s.items).filter(i=>/труб/i.test(i.name||'')).reduce((t,i)=>t+(i.qty||0)*(i.price||0),0),[sections]);
  const addFittingsByPct=useCallback(()=>{
    const sum=Math.round(pipeCostSum*(+fitPct||0)/100);
    if(!(sum>0)) return;
    const it=newItem('Фитинги, переходы и соединители (оценка '+fitPct+'% от труб)','К-т.',1,0,0,'','','','');
    it.price=sum; it.manualPrice=true;
    setSections(prev=>prev.map(s=>s.id==='magistral'?{...s,items:[...s.items,it]}:s));
  },[pipeCostSum,fitPct]);
  const addFittings=useCallback(()=>{
    const sel=fitRows.filter(r=>r.sel&&r.qty>0&&String(r.name).trim());
    if(!sel.length) return;
    const buckets={};
    sel.forEach(r=>{
      const m=matchPrice(r.name);
      let it;
      if(m){ const cp=priceType==='opt'?m.p:(m.r||m.p);
        it=newItem(r.name,r.unit||m.u||'шт.',r.qty,cp,globalMarkup,m.srcId,m.srcName,m.a||'',m.c||'');
        if(m.fuzzy) it.fuzzy=true;
      } else { it=newItem(r.name,r.unit,r.qty,0,globalMarkup,'','','',''); }
      (buckets[r.sec]||(buckets[r.sec]=[])).push(it);
    });
    setSections(prev=>prev.map(s=>buckets[s.id]?{...s,items:[...s.items,...buckets[s.id]]}:s));
    setFitRows([]); setShowFit(false);
  },[fitRows,globalMarkup,matchPrice,priceType]);
  // Автозаполнение блоков и латералей из PDF-чертежа (если есть текстовый слой)
  const fitPdfRef=useRef();
  const [fitPdfMsg,setFitPdfMsg]=useState('');
  const handleFitPdf=useCallback(e=>{
    const file=e.target.files[0]; if(!file)return; e.target.value='';
    setFitPdfMsg('Читаю чертёж…');
    const reader=new FileReader();
    reader.onload=async ev=>{ try{
      const pdfjsLib=window.pdfjsLib; if(!pdfjsLib){setFitPdfMsg('PDF-движок недоступен');return;}
      if(!pdfjsLib.GlobalWorkerOptions.workerSrc) pdfjsLib.GlobalWorkerOptions.workerSrc='https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
      const doc=await pdfjsLib.getDocument({data:ev.target.result}).promise;
      let text='';
      for(let i=1;i<=doc.numPages;i++){ const p=await doc.getPage(i); const tc=await p.getTextContent(); text+=' '+tc.items.map(it=>it.str).join(' '); }
      const T=text.replace(/\s+/g,' ');
      const latMatches=T.match(/Laterals\s*=\s*\d+/gi)||[];
      const blocks=latMatches.length;
      const lats=latMatches.reduce((a,s)=>a+(parseInt(s.replace(/\D/g,''),10)||0),0);
      const dripSegs=(T.match(/Lateral lenght\s*=\s*[\d.,]+/gi)||[]);
      const dripLenM=dripSegs.reduce((a,s)=>a+(parseFloat(s.replace(/[^\d.,]/g,'').replace(',','.'))||0),0);
      if(!blocks&&!lats){ setFitPdfMsg('⚠️ В этом PDF нет текстового слоя (как у чертежей-картинок) — введите блоки и латерали вручную'); return; }
      if(blocks) setFitBlocks(blocks);
      if(lats) setFitLaterals(lats);
      setFitPdfMsg('Из чертежа: блоков '+blocks+', латералей '+lats+(dripLenM?', капельная ≈ '+Math.round(dripLenM).toLocaleString('ru-RU')+' м':'')+'. Нажмите «Рассчитать».');
    }catch(err){console.error(err);setFitPdfMsg('⚠️ Не удалось прочитать PDF');} };
    reader.readAsArrayBuffer(file);
  },[]);
  const onAddBlank=useCallback(sid=>setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:[...s.items,newItem('','шт.',0,0,globalMarkup)]})),[globalMarkup]);
  const onAddFromSearch=useCallback((sid,r)=>{
    const cp=priceType==='opt'?r.p:(r.r||r.p);
    const item=newItem(r.n,r.u||'шт.',0,cp,globalMarkup,r.srcId,r.srcName,r.a,r.c);
    setSections(prev=>prev.map(s=>s.id!==sid?s:{...s,items:[...s.items,item]}));
    recordUse(r);
  },[globalMarkup,priceType,recordUse]);

  const applyMarkup=()=>setSections(prev=>prev.map(s=>({...s,items:s.items.map(i=>({...i,markup:globalMarkup,price:i.costPrice>0?Math.round(i.costPrice*(1+globalMarkup/100)):i.price}))})));

  const secTotal=s=>s.items.reduce((t,i)=>t+(i.qty||0)*(i.price||0),0);
  const grand=sections.reduce((t,s)=>t+secTotal(s),0);
  const logN=logOn?(parseFloat(logistika)||0):0, montN=montOn?(parseFloat(montazh)||0):0, shefN=shefOn?(parseFloat(shefMontazh)||0):0;
  const final=grand+logN+montN+shefN;
  const unpriced=sections.reduce((t,s)=>t+s.items.filter(i=>i.name&&(i.qty>0)&&!(i.price>0)).length,0);
  pdfDataRef.current={sections,kpNum,kpDate,typeCeny,zakazchik,object,ispolnitel,phone,projNum,projArea,projCulture,projRegion,projWater,logN,montN,shefN,shefUnit,notes,grand,final,reliefOn,relief,irrOn,irr,perHaOn,hydroOn};
  const totalBuiltin=Object.values(BUILTIN_CATALOGS).reduce((t,s)=>t+s.items.length,0);
  const totalExtra=Object.values(extraCatalogs).reduce((t,s)=>t+s.items.length,0);
  const totalCat=totalBuiltin+totalExtra+dynItems.length;
  // Объединённые доп.прайсы = загруженные + динамический «Мои позиции»
  const allSources=[
    ...Object.entries(BUILTIN_CATALOGS).map(([id,s])=>({id,name:s.name,count:s.items.length})),
    ...Object.entries(mergedExtra).map(([id,s])=>({id,name:s.name,count:s.items.length})),
  ];

  return(
    <div style={{minHeight:'100vh',background:'#F8FAFC',fontFamily:'Inter,Arial,sans-serif'}}>
      {/* Topbar */}
      <div style={{background:'#0B3A63',color:'#fff',padding:'12px 22px',display:'flex',alignItems:'center',justifyContent:'space-between',position:'sticky',top:0,zIndex:100,boxShadow:'0 1px 12px rgba(11,58,99,0.25)'}}>
        <div style={{display:'flex',alignItems:'center',gap:13}}>
          <img src={'data:image/png;base64,'+EMBLEM_B64} alt="Новый Полив" style={{height:52,width:'auto',background:'#fff',borderRadius:9,padding:4,boxShadow:'0 1px 6px rgba(0,0,0,0.18)'}}/>
          <div>
            <div style={{fontWeight:700,fontSize:19,letterSpacing:'-0.2px',lineHeight:1.1}}>Новый Полив <span style={{fontWeight:400,opacity:.7,fontSize:14}}>· Генератор КП</span></div>
            <div style={{fontSize:10,opacity:.7,marginTop:2,letterSpacing:'1.5px',textTransform:'uppercase'}}>Системы полива под ключ</div>
            <div style={{fontSize:11,opacity:.6,marginTop:2}}>База: {totalCat.toLocaleString()} позиций{totalExtra>0?` (+${totalExtra} доп.)`:''}</div>
          </div>
        </div>
        <div style={{display:'flex',gap:8,alignItems:'center'}}>
          <span style={{fontSize:13,opacity:.85,marginRight:4}}>Итого: <b style={{color:'#9FD0F0'}}>{final.toLocaleString('ru-RU')} ₽</b></span>
          {unpriced>0&&<span title="Позиции с количеством, но без цены" style={{fontSize:12,fontWeight:700,background:'#FFC53D',color:'#5c4a00',borderRadius:12,padding:'3px 10px'}}>⚠ {unpriced} без цены</span>}
          <button onClick={()=>askExport('pdf')} disabled={pdfLoading} title="Скачать PDF сразу" style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:pdfLoading?'default':'pointer',fontWeight:700,fontSize:13,background:pdfLoading?'rgba(255,255,255,0.25)':'#7FAF4D',color:'#fff'}}>{pdfLoading?'…':'PDF'}</button>
          <button onClick={()=>askExport('xlsx')} title="Выгрузить спецификацию в Excel" style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:700,fontSize:13,background:'#1D6F42',color:'#fff'}}>XLSX</button>
          <button onClick={()=>setShowClear(true)} title="Очистить таблицу позиций" style={{padding:'7px 12px',borderRadius:6,border:'1px solid rgba(255,255,255,0.35)',cursor:'pointer',fontWeight:600,fontSize:13,background:'transparent',color:'#fff'}}>🗑 Очистить</button>
          <button onClick={saveProject} title="Сохранить текущий КП в базу" style={{padding:'7px 14px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:'#1E5C8F',color:'#fff'}}>💾 Сохранить</button>
          <button onClick={()=>setShowDb(true)} title="Открыть базу сохранённых КП" style={{padding:'7px 14px',borderRadius:6,border:'1px solid rgba(255,255,255,0.35)',cursor:'pointer',fontWeight:600,fontSize:13,background:'rgba(255,255,255,0.12)',color:'#fff'}}>📂 База{projects.length>0?` (${projects.length})`:''}</button>
          {saveMsg&&<span style={{color:'#9FD0F0',fontWeight:600,fontSize:12}}>{saveMsg}</span>}
          <button onClick={()=>setView('edit')} style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='edit'?'#fff':'rgba(255,255,255,0.15)',color:view==='edit'?'#0B3A63':'#fff'}}>Редактор</button>
          <button onClick={()=>setView('preview')} style={{padding:'7px 16px',borderRadius:6,border:'none',cursor:'pointer',fontWeight:600,fontSize:13,background:view==='preview'?'#fff':'rgba(255,255,255,0.15)',color:view==='preview'?'#0B3A63':'#fff'}}>Предпросмотр</button>
        </div>
      </div>

      {view==='preview'?(
        <div style={{maxWidth:900,margin:'0 auto',padding:24}}>
          <div style={{display:'flex',gap:10,marginBottom:16}}>
            <button onClick={()=>setView('edit')} style={{padding:'9px 20px',border:'1px solid #E6EBF0',background:'#fff',color:'#0B3A63',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>← Назад</button>
            <button onClick={()=>askExport('pdf')} disabled={pdfLoading}
              style={{padding:'9px 24px',background:pdfLoading?'#5681a8':'#0B3A63',color:'#fff',border:'none',borderRadius:8,cursor:pdfLoading?'wait':'pointer',fontWeight:600,fontSize:14,minWidth:180}}>
              {pdfLoading ? 'Создаётся PDF…' : 'Скачать PDF'}
            </button>
            <button onClick={savePDFShot} disabled={pdfLoading} title="Запасной вариант: PDF из скриншота (если векторный вид не устроит)"
              style={{padding:'9px 16px',background:'#fff',color:'#6B7785',border:'1px solid #E6EBF0',borderRadius:8,cursor:pdfLoading?'wait':'pointer',fontWeight:600,fontSize:13}}>
              Скриншот-PDF
            </button>
            <button onClick={()=>askExport('xlsx')} title="Выгрузить спецификацию в Excel"
              style={{padding:'9px 20px',background:'#1D6F42',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:700,fontSize:14}}>
              Скачать Excel
            </button>
          </div>
          <div id="kp-print-area" style={{background:'#fff',borderRadius:10,padding:'36px 44px',boxShadow:'0 2px 12px rgba(0,0,0,0.1)'}}>
            <PrintView sections={sections} kpNum={kpNum} kpDate={kpDate} typeCeny={typeCeny}
              zakazchik={zakazchik} object={object} ispolnitel={ispolnitel} phone={phone}
              projNum={projNum} projArea={projArea} projCulture={projCulture} projRegion={projRegion} projWater={projWater}
              logN={logN} montN={montN} shefN={shefN} shefUnit={shefUnit} notes={notes} grand={grand} final={final}
              reliefOn={reliefOn} relief={relief} irrOn={irrOn} irr={irr} perHaOn={perHaOn} hydroOn={hydroOn}/>
          </div>
        </div>
      ):(
        <div style={{maxWidth:1560,margin:'0 auto',padding:'20px 16px'}}>

          {/* Бриф: реквизиты и запрос заказчика */}
          <div style={{margin:'2px 0 10px',fontWeight:800,fontSize:15,color:'#0B3A63',letterSpacing:'-0.2px'}}>Документ и запрос заказчика</div>

          {/* Реквизиты */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:700,color:'#0B3A63',marginBottom:12,fontSize:14}}>Реквизиты КП</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:12}}>
              <div><label style={S.lbl}>Номер КП <span style={{color:'#9aa',fontWeight:400}}>(авто)</span></label><input style={{...S.inp,width:'100%'}} value={kpNum} onChange={e=>setKpNum(e.target.value)} placeholder="КП-001"/></div>
              <div><label style={S.lbl}>Дата</label><input style={{...S.inp,width:'100%'}} type="date" value={kpDate} onChange={e=>setKpDate(e.target.value)}/></div>
              <div><label style={S.lbl}>Тип цен</label><select style={{...S.inp,width:'100%'}} value={typeCeny} onChange={e=>setTypeCeny(e.target.value)}><option>Опт</option><option>Розница</option><option>Дилер</option></select></div>
              <div><label style={S.lbl}>Объект</label><input style={{...S.inp,width:'100%'}} value={object} onChange={e=>setObject(e.target.value)} placeholder="Виноград, сад..."/></div>
              <div style={{gridColumn:'span 2'}}><label style={S.lbl}>Заказчик</label><input style={{...S.inp,width:'100%'}} value={zakazchik} onChange={e=>setZakazchik(e.target.value)} placeholder='ООО "Альминские холмы"'/></div>
              <div><label style={S.lbl}>Исполнитель</label><input style={{...S.inp,width:'100%'}} value={ispolnitel} onChange={e=>setIspolnitel(e.target.value)}/></div>
              <div><label style={S.lbl}>Телефон</label><input style={{...S.inp,width:'100%'}} value={phone} onChange={e=>setPhone(e.target.value)}/></div>
            </div>
          </div>

          {/* Параметры проекта — карточки в стиле PDF */}
          <div style={{background:'#fff',borderRadius:10,padding:18,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:600,color:'#0B3A63',marginBottom:4,fontSize:15,letterSpacing:'-0.2px'}}>Параметры проекта</div>
            <div style={{fontSize:12,color:'#6B7785',marginBottom:14}}>Показываются на обложке КП в виде карточек. Можно оставить пустыми.</div>
            <div style={{display:'grid',gridTemplateColumns:'repeat(5,1fr)',gap:12}}>
              {[
                {lbl:'№ проекта (авто)', val:projNum, set:setProjNum, ph:'НП-2026-001', acc:'#0B3A63'},
                {lbl:'Площадь', val:projArea, set:setProjArea, ph:'42 га', acc:'#7FAF4D'},
                {lbl:'Культура', val:projCulture, set:setProjCulture, ph:'Виноград', acc:'#2C7FB8'},
                {lbl:'Регион', val:projRegion, set:setProjRegion, ph:'Воронеж', acc:'#7FAF4D'},
                {lbl:'Источник воды', val:projWater, set:setProjWater, ph:'Скважина', acc:'#2C7FB8'},
              ].map((c,i)=>(
                <div key={i} style={{position:'relative',border:'1px solid #E6EBF0',borderRadius:8,padding:'12px 12px 10px',overflow:'hidden',background:'#F8FAFC'}}>
                  <div style={{position:'absolute',top:0,left:0,right:0,height:3,background:c.acc}}></div>
                  <label style={{fontSize:10,color:'#6B7785',textTransform:'uppercase',letterSpacing:'0.5px',fontWeight:600,display:'block',marginBottom:6}}>{c.lbl}</label>
                  <input style={{...S.inp,width:'100%',fontWeight:600,color:'#0B3A63',border:'none',background:'transparent',padding:'2px 0',fontSize:15}} value={c.val} onChange={e=>c.set(e.target.value)} placeholder={c.ph}/>
                </div>
              ))}
            </div>
          </div>

          <div className="kp-cols">
          <div className="kp-side">
          {/* Заявка от заказчика */}
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:12,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{fontWeight:700,color:'#0B3A63',marginBottom:4,fontSize:14}}>📄 Заявка от заказчика</div>
            <div style={{fontSize:12,color:'#6B7785',marginBottom:12}}>Загрузите заявку или готовое КП (DOCX, PDF, XLSX) — позиции и количество подтянутся автоматически. Если в файле есть цены и включён перенос — цены возьмутся из файла; иначе подставятся из прайсов, а ненайденное выделится жёлтым.</div>
            <div onClick={()=>setUsePrices(v=>!v)}
              style={{display:'flex',alignItems:'center',gap:10,fontSize:13,color:'#0B3A63',marginBottom:12,cursor:'pointer',userSelect:'none',fontWeight:600}}>
              <span role="switch" aria-checked={usePrices}
                style={{position:'relative',flexShrink:0,width:44,height:26,borderRadius:13,
                  background:usePrices?'#34C759':'#E4E7EC',transition:'background .22s ease',
                  boxShadow:'inset 0 0 0 1px rgba(0,0,0,0.04)'}}>
                <span style={{position:'absolute',top:2,left:2,width:22,height:22,borderRadius:'50%',background:'#fff',
                  boxShadow:'0 1px 3px rgba(0,0,0,0.3)',transition:'transform .22s cubic-bezier(.4,.1,.3,1.3)',
                  transform:usePrices?'translateX(18px)':'translateX(0)'}}></span>
              </span>
              <span>Переносить цены из файла <span style={{color:'#9aa',fontWeight:400}}>(если они там есть)</span></span>
            </div>
            <div style={{display:'flex',gap:10,alignItems:'center',flexWrap:'wrap'}}>
              <input ref={reqRef} type="file" accept=".docx,.pdf,.xlsx,.xls" style={{display:'none'}} onChange={handleRequest}/>
              <button onClick={()=>reqRef.current.click()}
                style={{padding:'9px 18px',background:'#2C7FB8',color:'#fff',border:'none',borderRadius:8,cursor:'pointer',fontWeight:600,fontSize:14}}>
                📄 Загрузить заявку / КП
              </button>
              {reqStatus==='parsing'&&<span style={{color:'#2C7FB8',fontWeight:600,fontSize:13}}>Обрабатываю файл…</span>}
              {reqStatus==='empty'&&<span style={{color:'#d07000',fontWeight:600,fontSize:13}}>Не удалось распознать позиции в файле</span>}
              {reqStatus==='error'&&<span style={{color:'#c0392b',fontWeight:600,fontSize:13}}>Ошибка чтения файла</span>}
              {reqStatus&&typeof reqStatus==='object'&&(
                <span style={{fontWeight:600,fontSize:13,color:'#0B3A63'}}>
                  Добавлено {reqStatus.total} позиц.
                  {reqStatus.fromFile>0?<span style={{color:'#2e7d32'}}> · цена из файла: {reqStatus.fromFile}</span>:''}
                  {reqStatus.fromCat>0?<span style={{color:'#2C7FB8'}}> · из прайсов: {reqStatus.fromCat}</span>:''}
                  {reqStatus.noPrice>0?<span style={{color:'#d07000'}}> · без цены: {reqStatus.noPrice}</span>:''}
                </span>
              )}
            </div>
          </div>
          <div style={{background:'#fff',borderRadius:10,padding:16,marginBottom:14,boxShadow:'0 1px 4px rgba(11,58,99,0.06)',border:'1px solid #E6EBF0'}}>
            <div style={{display:'flex',gap:16,alignItems:'center',flexWrap:'wrap'}}>
              <div style={{fontWeight:700,color:'#d07000',fontSize:14}}>Глобальная накрутка</div>
              <div style={{display:'flex',alignItems:'center',gap:8}}>
                <NumInput value={globalMarkup} onChange={setGlobalMarkup} decimals={0}
                  style={{...S.inp,width:70,fontSize:18,fontWeight:800,color:'#d07000',border:'2px solid #f39c12',padding:'4px 6px',textAlign:'center'}}/>
                <span style={{fontWeight:700,color:'#d07000',fontSize:18}}>%</span>
